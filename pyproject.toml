[project]
name = "forever-claude-template"
version = "0.1.0"
description = "Template repo for a persistent Claude agent"
requires-python = ">=3.11"
dependencies = [
    "telegram-bot",
    "bootstrap",
    "imbue-common",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-timeout>=2.0",
    "ruff>=0.4",
    "pyright>=1.1",
    "inline-snapshot>=0.31",
    "import-linter>=2.0",
    "tomlkit>=0.12",
]

[tool.uv]
package = false

[tool.uv.workspace]
members = ["libs/telegram_bot", "libs/bootstrap"]

[tool.uv.sources]
telegram-bot = { workspace = true }
bootstrap = { workspace = true }
imbue-common = { path = "libs/mngr/libs/imbue_common" }

[tool.pytest.ini_options]
testpaths = ["."]
timeout_func_only = true
addopts = [
    "--timeout=10",
    "--ignore=libs/mngr",
]

[tool.ruff]
target-version = "py311"
exclude = ["libs/mngr"]

[tool.ruff.lint]
select = ["F", "I", "UP006", "UP007"]

[tool.pyright]
pythonVersion = "3.11"
exclude = ["libs/mngr"]
