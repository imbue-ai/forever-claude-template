# Extra tmux settings for the minds in-memory persistent terminals feature.
#
# Sourced from ~/.tmux.conf (written by the template's extra_provision_command
# in .mngr/settings.toml). Kept in its own committed file rather than inlined
# into that printf so the hook lines stay readable instead of drowning in
# nested shell quoting.
#
# Applies to the shared default tmux server -- i.e. every session, both the
# mngr-<agent> agent sessions and the terminal-<N> user terminals the dockview
# "New terminal" button creates.

# Keep a generous in-memory scrollback (tmux default is 2000). This is purely
# per-session memory: it is never written to disk and dies with the tmux server
# on a container restart, so it carries no persistence/security implications.
set -g history-limit 10000

# When one session is attached from more than one client (e.g. the same
# terminal open in two dockview tabs), size to the most-recently-active client
# instead of shrinking every client to the smallest one.
set -g window-size latest

# Live tab-title tracking. When a client switches which session it is attached
# to (tmux switch-client) or a session is renamed, notify the system_interface
# so the owning dockview tab's title follows along. The helper is best-effort:
# it POSTs to the loopback API and never blocks tmux (run-shell -b), and it
# reads session names/ids from tmux itself rather than receiving them as shell
# args, so a session id like "$3" is never re-expanded by the shell. Only the
# client's pty (/dev/pts/N, always shell-safe) is passed in.
set-hook -g client-session-changed 'run-shell -b "python3 /mngr/code/scripts/notify_terminal_session.py --kind session-changed --client-tty #{client_tty}"'
set-hook -g session-renamed 'run-shell -b "python3 /mngr/code/scripts/notify_terminal_session.py --kind session-renamed"'
