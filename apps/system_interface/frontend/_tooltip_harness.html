<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="src/style.css">
<style>
  body { padding: 120px 60px; background: #f7f7f5; }
  /* force-show all toolbar tooltips for the screenshot */
  .message-input-toolbar [data-tooltip]::after,
  .message-input-toolbar [data-tooltip]::before { opacity: 1 !important; visibility: visible !important; }
</style>
</head>
<body>
<div class="message-input mx-auto w-full">
  <div class="message-input-box flex flex-col">
    <div class="message-input-row flex flex-row items-center">
      <textarea class="message-input-textbox flex-1 resize-none focus:outline-none" placeholder="Type a message..." rows="1"></textarea>
      <div class="message-input-toolbar">
        <div class="model-selector-wrapper">
          <button type="button" class="model-selector-trigger" data-tooltip="Select model">
            <span class="model-selector-label">Opus 4.8</span>
            <span class="model-selector-chevron">v</span>
          </button>
        </div>
        <button type="button" class="fast-toggle" data-tooltip="Enable fast mode" aria-label="Enable fast mode">Z</button>
        <button type="button" class="message-input-attach-button" data-tooltip="Attach files" aria-label="Attach files">+</button>
        <button class="message-input-stop-button" data-tooltip="Interrupt" aria-label="Interrupt">S</button>
        <button class="message-input-send-button" data-tooltip="Send message" aria-label="Send message">></button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
