name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

jobs:
  # Changelog gate. Diffs the PR branch against its real base branch and fails
  # if any touched project is missing its per-PR changelog entry. Pure stdlib,
  # so no `uv sync`; just enough git history to compute the diff.
  #
  # Opt-in: this job only runs when the repository variable ENFORCE_CHANGELOG is
  # set to 'true' (Settings -> Secrets and variables -> Actions -> Variables).
  # Downstream repos that publish a workspace inherit this workflow but not the
  # variable, so they never see a changelog CI failure. The template repo sets
  # ENFORCE_CHANGELOG=true to enforce the convention on itself.
  check-changelog:
    runs-on: ubuntu-latest
    # Disabled by request. Was: github.event_name == 'pull_request' && vars.ENFORCE_CHANGELOG == 'true'.
    # Restore that condition to re-enable the per-PR changelog gate.
    if: false
    steps:
      - uses: actions/checkout@v6

      - name: Fetch base branch and deepen HEAD for the changelog diff
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --no-tags --unshallow origin "$(git rev-parse HEAD)"
          fi
          git fetch --no-tags origin \
            "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check changelog entries
        run: python scripts/check_changelog_entries.py

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/system_interface/frontend/package-lock.json

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Build apps/system_interface frontend
        working-directory: apps/system_interface/frontend
        run: |
          npm ci
          npm run build

      - name: Run root tests
        run: PYTEST_MAX_DURATION_SECONDS=300 uv run pytest

      - name: Run apps/system_interface tests
        working-directory: apps/system_interface
        run: PYTEST_MAX_DURATION_SECONDS=300 uv run pytest
