# --- Command defaults ---

# Default create command settings -- apply to all mngr create from this repo
[commands.create]
type = "claude"
connect = false
ensure_clean = false
pass_env__extend = ["TELEGRAM_BOT_TOKEN", "TELEGRAM_USER_NAME", "REMOTE_SERVICE_CONNECTOR_URL", "LATCHKEY_GATEWAY", "GH_TOKEN"]
host_env__extend = [
    "IS_SANDBOX=1",
    "IS_AUTONOMOUS=1",
    # might as well use the latest model if we actually do want to try fast mode, sure
    "CLAUDE_CODE_ENABLE_OPUS_4_7_FAST_MODE=1",
    # Lock Claude Code to the version pinned in agent_types.claude.version and the
    # Dockerfile's CLAUDE_CODE_VERSION; disable the auto-updater + background
    # feedback pings so the installed binary cannot silently drift. Tracks the
    # FIXME on ClaudeAgentConfig.version in libs/mngr_claude/.../plugin.py.
    "DISABLE_AUTOUPDATER=1",
    "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1",
    "CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY=1",
    # Disable claude.ai account MCP connector sync -- it's an OAuth side
    # channel to third-party services that bypasses the latchkey gateway.
    "ENABLE_CLAUDEAI_MCP_SERVERS=false",
    # Tickets live inside runtime/ so they ride the runtime-backup branch.
    # tk reads TICKETS_DIR if set; absolute path so it works from worktree
    # subdirs too. /mngr/code/ is the container WORKDIR (set by the Dockerfile);
    # a /code -> /mngr/code symlink is kept in the image as a safety net.
    "TICKETS_DIR=/mngr/code/runtime/tickets",
]
worktree_base_folder = "/mngr/worktree/"
# claude_subagent_proxy is upstream mngr's experimental Claude-Code-Task ->
# mngr-managed-subagent proxy. It is not used here. Without this disable, when
# the proxy plugin is present in the system-tool mngr install it gets the
# on_after_provisioning hook fired, which installs a PreToolUse:Agent hook
# (spawn.py) into each new agent's .claude/settings.local.json -- and that
# hook then wedges parent agents in a Haiku retry loop whenever it hits a
# permanent error (e.g. the proxy package isn't in /mngr/code/.venv, or
# `mngr-proxy-child` isn't a registered agent type in the resolved mngr).
# The disable is non-strict (commands.create.disable_plugin path), so this is
# safe even on installs that don't include the proxy plugin at all.
disable_plugin__extend = ["recursive", "ttyd", "claude_subagent_proxy"]
yes = true

# for the list command -- ensures that we don't see other agents when we're listing, even if we happen to list remote agents
[commands.list]
include__extend = ["""has(labels.workspace)"""]

# --- Agent types ---

# Agent type defaults -- apply to all claude agents created from this repo
[agent_types.claude]
auto_dismiss_dialogs = true
auto_allow_permissions = true
cli_args = """--dangerously-skip-permissions --disallowed-tools AskUserQuestion,ExitPlanMode"""
settings_overrides__extend = {model = "opus[1m]", fastMode = false}
# Pin Claude Code to a specific version; the provisioning-time version check
# refuses to start the agent if the installed binary diverges. Bump this in
# sync with CLAUDE_CODE_VERSION in the Dockerfile.
version = "2.1.141"
# Share the services agent's CLAUDE_CONFIG_DIR across every other agent so
# auth, plugins, marketplaces, and settings are configured exactly once
# (inside the services agent) and inherited via the host env file the
# bootstrap writes. Disabled below on the "main" type, which still owns
# the per-agent config dir that everyone else points at.
use_env_config_dir = true

# The "main" (services) agent type -- inherits everything from claude, then
# disables every path that pulls user-local content into the workspace. The
# repo at the requested git ref is the canonical workspace definition;
# nothing from the invoking user's ~/.claude/ or ~/.mngr/ should leak in.
[agent_types.main]
parent_type = "claude"
sync_home_settings = false
sync_claude_json = false
sync_claude_credentials = false
sync_credentials_on_login = false
# Keep this agent's per-agent CLAUDE_CONFIG_DIR (don't inherit the parent's
# new shared-mode default). Every other agent in the workspace points at
# *this* directory via the host env var the bootstrap writes.
use_env_config_dir = false
# Window 0 of the services agent must never actually run claude -- the
# bootstrap+services live in other tmux windows, and the real chat agents
# are spun up separately by the bootstrap. The trailing "&& claude" is
# unreachable; it exists only so ClaudeAgent.assemble_command can still
# splice --resume / --session-id onto a claude-shaped invocation without
# producing a syntactically bogus command.
command = "sleep infinity && claude"

# the "worker" agent type -- the default for delegated tasks
[agent_types.worker]
parent_type = "claude"

# --- Provider configurations ---

# all disabled for now, since we don't want the agents to be able to launch mngr agents anywhere except within their own containers

[providers.modal]
is_enabled = false

[providers.docker]
is_enabled = false
isolate_host_volumes = true

# --- Create templates ---

## these are all for launching the original agent (from outside the sandbox, in the first place)

# the template that is shared across all agent types
[create_templates.main]
type = "main"
# `/welcome` is *not* set here anymore: the services agent's window 0 sleeps
# forever (see `[agent_types.main] command`) and never reaches claude. The
# bootstrap creates a separate chat agent on first boot and passes
# `--message /welcome` to it instead.
env__extend = ["REVIEWER_AUTOFIX_ENABLE=0", "REVIEWER_CI_ENABLE=0", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0", "REVIEWER_VERIFY_ARCHITECTURE_ENABLE=0", "REVIEWER_STOP_HOOK_ENABLE=0"]
extra_window = [
    "bootstrap='uv run bootstrap'",
    "telegram='uv run telegram-bot'",
    "terminal='bash scripts/run_ttyd.sh'",
    "reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR $REVIEWER_VERIFY_ARCHITECTURE_ENABLE $REVIEWER_STOP_HOOK_ENABLE'",
    "git_auth_setup='git config --global --replace-all url.\"https://github.com/\".insteadOf \"git@github.com:\" && git config --global --add url.\"https://github.com/\".insteadOf \"ssh://git@github.com/\" && git config --global core.hooksPath /mngr/code/scripts/git_hooks && gh auth setup-git'"
]
# Write a sane default tmux config on every minds host. tuple-typed
# `extra_provision_command` stacks across templates (see
# `apply_create_template` in vendor/mngr/.../common_opts.py), so the
# mode-specific templates (docker/lima/...) keep their own commands.
extra_provision_command__extend = [
    '''printf '%s\n' 'set -g alternate-screen off' 'set -g mouse on' > "$HOME/.tmux.conf"''',
]

# template for docker provider
[create_templates.docker]
provider = "docker"
target_path = "/mngr/code/"
setting__extend = ["providers.docker.is_enabled=true"]
build_arg__extend = ["--file=Dockerfile", "."]
# `--cap-add=SYS_PTRACE` is a `docker run` flag (not `docker build`), so it
# rides on `start_arg` rather than `build_arg`. Lets us attach gdb / strace
# inside the container for debugging without rebuilding the image.
start_arg__extend = ["--cap-add=SYS_PTRACE"]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"
# Forward Anthropic creds + GH_TOKEN from minds' subprocess env onto the
# new container's env. The agent process inherits the container env, so
# this is what gives the agent its ANTHROPIC_API_KEY (etc.) in
# non-IMBUE_CLOUD compute modes.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Seed /mngr/code from /docker_build_code (baked into the image) onto the
# per-host volume. Runs synchronously after the host is online but
# before any agent work_dir setup, so the workspace is in place by the
# time the user's git refs land on top. See scripts/fct_seed.sh.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]

# template for lima VM provider
[create_templates.lima]
provider = "lima"
target_path = "/mngr/code/"
idle_mode = "disabled"
start_arg__extend = ["--cpus=2", "--memory=4", "--disk=20"]
# Back host_dir with an in-VM btrfs additional disk instead of a 9p bind
# mount, so the minds workspace data lives on a snapshottable filesystem
# (towards consistent backups). This drops the host-side `volumes/<host_id>/`
# bind mount; offline reads via `mngr event` / `mngr transcript` against
# a stopped Lima host stop working in this mode until the host is started.
# See vendor/mngr/specs/lima-btrfs-host-volume/concise.md for the design.
setting__extend = ["providers.lima.is_host_data_volume_exposed=false"]
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
extra_provision_command__extend = [
    # Create /mngr/worktree/ on the fresh lima VM so worktrees ride the
    # /mngr/ volume backup, and install the /worktree -> /mngr/worktree
    # safety-net symlink so any straggling `/worktree/...` references keep
    # working (mirrors the Dockerfile symlink installed in docker-based
    # providers).
    "sudo mkdir -p /mngr/worktree && sudo chown $(whoami) /mngr/worktree && sudo ln -sfn /mngr/worktree /worktree",
    # Same safety-net symlink for the workspace itself: /code -> /mngr/code
    # so any straggling absolute /code/... reference still resolves. The
    # workspace itself rsyncs onto /mngr/code/ via target_path above.
    "sudo ln -sfn /mngr/code /code",
    # Parallel provision script (apt + uv installer || latchkey + uv tool install ||
    # uv sync + playwright) + Phase D cred-bridge watcher for ~/.claude/.credentials.json
    # symlink-into-VM. The whole pipeline is base64-encoded so the toml stays readable
    # despite the multi-line content. See [agent_types.main]'s sync_claude_credentials.
    "echo  | base64 -d | bash",
    # Expose the vendored tk ticket tracker on PATH (mirrors the Dockerfile
    # symlink at /root/.local/bin/tk). $HOME/.local/bin is already on PATH
    # because the uv installer prepends it.
    "mkdir -p $HOME/.local/bin && ln -sf /mngr/code/vendor/tk/ticket $HOME/.local/bin/tk",
    # Source /mngr/env (the host env file, when present) for interactive bash
    # sessions, so a shell opened via `limactl shell <instance>` inherits the
    # variables mngr commands need. Mirrors the Dockerfile snippet that does
    # the same for docker-based providers (`docker exec -it bash`); the only
    # difference is the non-root lima user's $HOME/.bashrc target instead of
    # /root/.bashrc. mngr otherwise only sources /mngr/env in the tmux
    # default-command, so manually-opened shells miss it without this.
    '''printf '%s\n' 'if [ -f /mngr/env ]; then set -a; . /mngr/env; set +a; fi' >> "$HOME/.bashrc"''',
]

# template for vultr VPS provider (cloud mode)
[create_templates.vultr]
provider = "vultr"
target_path = "/mngr/code/"
# ``--vps-region=sjc`` (Silicon Valley) instead of the mngr_vultr default
# ``ewr`` (Newark) -- imbue's operators run the bake from west-coast
# machines, and the New Jersey region routinely produced ~1s SSH RTTs
# and ~1.6 MB/s effective rsync throughput, which combined with the
# ~1500-file build context made the cold upload time out at 10 minutes.
# Keeping the default change at the template level so every minds /
# imbue_cloud-pool create lands in the same place; CLI users who want
# a different region can still override per-invocation with
# ``-b --vps-region=<other>``.
build_arg__extend = ["--file=Dockerfile", "--vps-plan=vc2-2c-4gb", "--vps-region=sjc", "."]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Same first-boot seed as the docker template; see comment there.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]

# template for OVH VPS provider (the imbue-cloud pool-bake's default)
[create_templates.ovh]
provider = "ovh"
target_path = "/mngr/code/"
# No plan / datacenter baked in: the pool-bake CLI
# (``mngr imbue_cloud admin pool create``) appends
# ``-b --vps-datacenter=<region>`` per invocation so a single bake
# session can spread hosts across regions. Plan defaults come from
# ``OvhProviderConfig.default_plan`` (``vps-2025-model1`` -- 1 vCPU /
# 8 GB RAM / 80 GB SSD at ~$7.99/mo as of 2025-05). Operators who want
# a different plan override per-invocation with ``-b --vps-plan=<code>``.
build_arg__extend = ["--file=Dockerfile", "."]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Same first-boot seed as the docker template; see comment there.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]

# Template for imbue_cloud-leased pool hosts. minds invokes this as
# `--template main --template imbue_cloud` (mirroring how the other modes
# use `--template main --template <provider>`), so the imbue_cloud-specific
# knobs that used to be inlined in `_build_mngr_create_command` live here
# instead. The actual provider name on the address is per-account
# (`imbue_cloud_<account-slug>`), so it's not declared here -- the
# `<name>@<host>.imbue_cloud_<slug>` address tells mngr where to land.
[create_templates.imbue_cloud]
# Leased pool hosts must never auto-shutdown -- the host is borrowed for a
# whole user session, not a one-shot job.
idle_mode = "disabled"
# Forward the LiteLLM-minted ANTHROPIC creds + the minds-side MNGR_PREFIX
# + an optional GH_TOKEN from minds' subprocess env onto the host's
# ``/mngr/env``. minds writes these into the subprocess env it hands
# ``mngr create`` (see ``run_mngr_create`` in
# ``vendor/mngr/apps/minds/imbue/minds/desktop_client/agent_creator.py``)
# so the host actually has them at the moment ``--pass-host-env`` reads.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "MNGR_PREFIX", "GH_TOKEN"]

## and these templates are for sub-agents created within the sandbox

# Chat template: minimal agent for additional chat sessions in the same work directory
[create_templates.chat]
type = "claude"
env = ["REVIEWER_AUTOFIX_ENABLE=0", "REVIEWER_CI_ENABLE=0", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0", "REVIEWER_VERIFY_ARCHITECTURE_ENABLE=0", "REVIEWER_STOP_HOOK_ENABLE=0"]
extra_window = [
    "reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR $REVIEWER_VERIFY_ARCHITECTURE_ENABLE $REVIEWER_STOP_HOOK_ENABLE'"
]

# Worktree template: agent in a new git worktree, no services by default --
# creates its own as needed. Uses the plain `claude` type (not `main`), so
# worktree agents run a real claude binary and share the services agent's
# CLAUDE_CONFIG_DIR via the inherited host env var.
[create_templates.worktree]
type = "claude"

# Worker template: general purpose sub agent for doing tasks reliably (and ensuring that they are verified)
[create_templates.worker]
type = "worker"
extra_window = ["reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR'"]
env = ["REVIEWER_AUTOFIX_ENABLE=1", "REVIEWER_CI_ENABLE=1", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0"]
agent_args = [
    "--dangerously-skip-permissions",
    "--append-system-prompt",
    "You were launched by another agent. List any questions at the end of your final response, along with the assumptions you made.",
]

# Crystallize-worker template: sub-agent for the crystallize-task / heal-skill /
# update-skill flows. Inherits from `worker`, adds:
#  - MNGR_AGENT_ROLE=worker so the crystallization Stop hook skips in-worker.
#  - A pre-provision step that installs the bundled worker sub-skills from
#    each lifecycle skill's assets/worker/ directory into the worker's
#    .agents/skills/ tree. The installer auto-discovers any parent skill
#    under .agents/skills/ that has an assets/worker/ subdir.
[create_templates.crystallize-worker]
type = "worker"
extra_window = ["reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR $REVIEWER_VERIFY_ARCHITECTURE_ENABLE $REVIEWER_STOP_HOOK_ENABLE'"]
env = ["REVIEWER_AUTOFIX_ENABLE=1", "REVIEWER_CI_ENABLE=1", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0", "REVIEWER_VERIFY_ARCHITECTURE_ENABLE=1", "REVIEWER_STOP_HOOK_ENABLE=1", "MNGR_AGENT_ROLE=worker"]
extra_provision_command = [
    "bash .agents/shared/scripts/install_worker_skills.sh .agents/skills",
]
agent_args = [
    "--dangerously-skip-permissions",
]
