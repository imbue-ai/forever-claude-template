# --- Command defaults ---

# Default create command settings -- apply to all mngr create from this repo
[commands.create]
# type = "claude": restored. An earlier pass of this file removed this
# default on the theory that a silent fallback would mask a caller that
# forgot to pass a type -- but real, existing callers depend on it and
# never pass one explicitly: vendor/mngr/apps/minds/.../agent_creator.py
# builds every Docker/Lima/Vultr/AWS/imbue_cloud create command as
# `--template main --template <provider>` with no --type at all. Removing
# this broke every real "create workspace" click in the minds desktop
# client (caught by code review, not proactively). claude remains the
# default harness when nothing else specifies one, matching every other
# _DEFAULT_HARNESS reference in this repo (bootstrap/manager.py, etc.).
type = "claude"
connect = false
ensure_clean = false
pass_env__extend = ["REMOTE_SERVICE_CONNECTOR_URL", "LATCHKEY_GATEWAY", "GH_TOKEN"]
host_env__extend = [
    "IS_SANDBOX=1",
    "IS_AUTONOMOUS=1",
    # Fast mode is enabled for all agents (settings_overrides fastMode=true on
    # agent_types.claude below); this gates the Opus fast-mode capability on.
    "CLAUDE_CODE_ENABLE_OPUS_4_7_FAST_MODE=1",
    # Skip Claude Code's org-level fast-mode eligibility check. Agents sign in
    # with a Claude Max subscription that supports fast mode, but the session
    # resolves under an organization whose org check otherwise reports fast
    # mode as "currently unavailable" -- so without this, /fast is refused in
    # the container even though the same account gets fast mode on the laptop.
    "CLAUDE_CODE_SKIP_FAST_MODE_ORG_CHECK=1",
    # Lock Claude Code to the version pinned in agent_types.claude.version and the
    # Dockerfile's CLAUDE_CODE_VERSION; disable the auto-updater + background
    # feedback pings so the installed binary cannot silently drift. Tracks the
    # FIXME on ClaudeAgentConfig.version in libs/mngr_claude/.../plugin.py.
    "DISABLE_AUTOUPDATER=1",
    "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1",
    "CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY=1",
    # Disable claude.ai account MCP connector sync -- it's an OAuth side
    # channel to third-party services that bypasses the latchkey gateway.
    "ENABLE_CLAUDEAI_MCP_SERVERS=false",
    # Tickets live inside runtime/ so they ride the runtime-backup branch.
    # tk reads TICKETS_DIR if set; absolute path so it works from worktree
    # subdirs too. /mngr/code/ is the container WORKDIR (set by the Dockerfile);
    # a /code -> /mngr/code symlink is kept in the image as a safety net.
    "TICKETS_DIR=/mngr/code/runtime/tickets",
    # Workaround for an Apple M5 lima-VZ guest CPU mismatch: the Debian 12
    # guest kernel advertises SVE / SVE2 in /proc/cpuinfo, but lima-VZ on M5
    # traps the `cntb` SVE instruction emitted by OpenSSL's
    # `_armv8_sve_get_vl_bytes` during CPU-cap init -- so cryptography>=47's
    # Rust openssl binding SIGILLs on import (rc=132), taking down any tool
    # that transitively imports paramiko (mngr CLI, system-interface, etc.).
    # OPENSSL_armcap=0 disables OpenSSL's CPU-cap detection so it falls back
    # to NEON-only paths; runs cleanly on both real M-series silicon and
    # lima-VZ. Performance impact is negligible for this workload (TLS / SSH
    # session setup only). Drop when lima-VZ on M5 correctly virtualizes SVE
    # or when upstream OpenSSL guards `cntb` behind hwcap2. Empirically
    # bisected to `_armv8_sve_get_vl_bytes+0: cntb x0` via gdb on a fresh
    # Debian 12 lima VM on the launch-to-msg M5 runner; Ubuntu 24.04 lima
    # guests don't advertise SVE so they don't hit this.
    "OPENSSL_armcap=0",
]
worktree_base_folder = "/mngr/worktree/"
# claude_subagent_proxy is upstream mngr's experimental Claude-Code-Task ->
# mngr-managed-subagent proxy. It is not used here. Without this disable, when
# the proxy plugin is present in the system-tool mngr install it gets the
# on_after_provisioning hook fired, which installs a PreToolUse:Agent hook
# (spawn.py) into each new agent's .claude/settings.local.json -- and that
# hook then wedges parent agents in a Haiku retry loop whenever it hits a
# permanent error (e.g. the proxy package isn't in /mngr/code/.venv, or
# `mngr-proxy-child` isn't a registered agent type in the resolved mngr).
# The disable is non-strict (commands.create.disable_plugin path), so this is
# safe even on installs that don't include the proxy plugin at all.
disable_plugin__extend = ["recursive", "ttyd", "claude_subagent_proxy"]
yes = true

# --- Agent types ---

# Agent type defaults -- apply to all claude agents created from this repo
[agent_types.claude]
auto_dismiss_dialogs = true
auto_allow_permissions = true
cli_args = """--dangerously-skip-permissions --disallowed-tools AskUserQuestion,ExitPlanMode,TodoWrite,TaskCreate,TaskList,TaskUpdate"""
settings_overrides__extend = {model = "opus[1m]", fastMode = true}
# Pin Claude Code to a specific version; the provisioning-time version check
# refuses to start the agent if the installed binary diverges. Bump this in
# sync with CLAUDE_CODE_VERSION in the Dockerfile.
version = "2.1.160"
# Share the services agent's CLAUDE_CONFIG_DIR across every other agent so
# auth, plugins, marketplaces, and settings are configured exactly once
# (inside the services agent) and inherited via the host env file the
# bootstrap writes. Disabled below on the "main" type, which still owns
# the per-agent config dir that everyone else points at.
isolate_local_config_dir = false

# The "claude-main" (services) agent type -- inherits everything from claude,
# then disables every path that pulls user-local content into the workspace.
# The repo at the requested git ref is the canonical workspace definition;
# nothing from the invoking user's ~/.claude/ or ~/.mngr/ should leak in.
# Named "claude-main" (not the bare "main") to stay symmetric with
# codex-main/antigravity-main/opencode-main below -- claude gets no naming
# privilege now that other harnesses exist.
[agent_types.claude-main]
parent_type = "claude"
sync_home_settings = false
sync_claude_json = false
sync_claude_credentials = false
sync_credentials_on_login = false
# Keep this agent's per-agent CLAUDE_CONFIG_DIR (don't inherit the parent's
# new shared-mode default). Every other agent in the workspace points at
# *this* directory via the host env var the bootstrap writes.
isolate_local_config_dir = true
# Window 0 of the services agent must never actually run an interactive CLI --
# the bootstrap window (extra_window) runs supervisord, which owns every
# background service, and the real chat agents are spun up separately by the
# bootstrap. Making window 0 a live agent is unsafe: the user could close it,
# tearing down the tmux session (and supervisord with it). This no-op is
# shared verbatim across all four harnesses (see codex-main/antigravity-main/
# opencode-main below) -- the trailing `--` makes mngr's assemble_command
# (which always appends cli_args after the base command) dump those args into
# bash's unused positional params, silently discarded regardless of content.
command = "bash -c 'exec sleep infinity' --"

# the "claude-worker" agent type -- the default for delegated claude tasks
[agent_types.claude-worker]
parent_type = "claude"

# --- Agent types: codex ---

# Agent type defaults -- apply to all codex agents created from this repo.
[agent_types.codex]
# codex's complete equivalent of claude's --dangerously-skip-permissions:
# sets approval_policy="never" in the per-agent config.toml so codex never
# prompts for tool approval. Codex honors approval_policy directly -- there
# is no separate CLI-flag-level skip-all mechanism to also set.
auto_allow_permissions = true
# Auto-trust the source repo + allow the codex hook-review bypass without
# prompting, mirroring claude's auto_dismiss_dialogs. Without this,
# provisioning interactively click.confirm's before mutating global config,
# which would hang an unattended agent.
auto_dismiss_dialogs = true
sandbox_mode = "workspace-write"
# Shut-up settings, confirmed against the installed codex-cli binary
# (`codex app-server --help`, `codex features list`) rather than docs alone:
#  - analytics.enabled / feedback.enabled: telemetry + feedback-survey off
#    (feedback.enabled also disables codex's bundled Sentry crash reporting).
#  - check_for_update_on_startup: suppresses codex's own blocking
#    "Update available!" startup prompt.
#  - features.multi_agent: codex's own subagent-spawning capability, off --
#    delegation should go through mngr/fct's own worker flow, not codex's
#    native one (this is the real analog of blocking claude's
#    TaskCreate/TaskList/TaskUpdate family).
#  - features.apps: disables codex's plugin/connector marketplace entirely.
# codex's own `update_plan` tool (its TodoWrite equivalent) has no dedicated
# feature flag and cannot be individually disabled -- see CLAUDE.md for the
# system-prompt-level mitigation (use tk instead).
# model + model_reasoning_effort: both confirmed real, valid values --
# this machine's own ~/.codex/config.toml already runs these exact settings.
# xhigh mirrors claude's opus[1m] intent (opus is the top-tier model choice;
# claude has no separate explicit effort-level field to mirror numerically,
# since none is set today -- xhigh is codex's own max).
# sandbox_workspace_write.network_access = true: without this, codex's
# workspace-write sandbox blocks all network access at the OS level
# (seccomp/landlock) independent of auto_allow_permissions/approval_policy --
# confirmed real schema via developers.openai.com/codex/config-reference and
# a live GitHub issue discussion (openai/codex#13373), not guessed. Without
# it, `git push`/`uv sync`/package installs -- which AGENTS.md instructs
# every agent to run -- would silently fail inside a codex agent's sandbox.
# Caught by code review, not caught when sandbox_mode was first set.
# KEEP IN SYNC: the memory MCP server def (command/args/MEMORY_FILE_PATH)
# below is hand-duplicated 4x total -- here, at settings.toml:~199
# (antigravity), settings.toml:~284 (opencode), and .mcp.json (claude).
# TOML has no anchor/reference mechanism and .mcp.json is a separate JSON
# file (which can't hold a comment pointing back here at all) -- a future
# change to this server (version bump, path change) must be applied to all
# 4 by hand. No test catches drift between them (untyped free-form blobs).
config_overrides__extend = {model = "gpt-5.5", model_reasoning_effort = "xhigh", analytics = {enabled = false}, feedback = {enabled = false}, check_for_update_on_startup = false, features = {multi_agent = false, apps = false}, sandbox_workspace_write = {network_access = true}, mcp_servers = {memory = {command = "npx", args = ["-y", "@modelcontextprotocol/server-memory"], env = {MEMORY_FILE_PATH = "/mngr/code/runtime/memory/memory.jsonl"}}}}
# Pin the codex CLI version; provisioning verifies the installed codex
# matches, erroring on a mismatch. Bump deliberately, not by accident.
version = "0.142.5"

# The "codex-main" (services) agent type. Unlike claude, codex has NO
# isolate_local_config_dir equivalent -- CODEX_HOME is always per-agent,
# hardcoded, no toggle -- so there is nothing to flip here; every codex
# agent (including this one) is permanently isolated. Only auth is ever
# shared, via codex's own always-on auth.json symlink (not a toggle either).
[agent_types.codex-main]
parent_type = "codex"
command = "bash -c 'exec sleep infinity' --"

# the "codex-worker" agent type -- the default for delegated codex tasks
[agent_types.codex-worker]
parent_type = "codex"

# --- Agent types: antigravity ---

# Agent type defaults -- apply to all antigravity agents created from this repo.
[agent_types.antigravity]
# Shared memory MCP server (same one claude/codex/opencode use, see
# .mcp.json). Requires a real mngr_antigravity code change (a new
# mcp_servers field writing $HOME/.gemini/config/mcp_config.json -- a file
# separate from settings_overrides' settings.json) since no field for this
# existed before; see vendor/mngr/libs/mngr_antigravity's changelog.
# KEEP IN SYNC: hand-duplicated 4x total -- also at settings.toml's codex
# and opencode config_overrides__extend blocks, and .mcp.json (claude,
# which can't hold a comment pointing back here at all since JSON has no
# comment syntax). No test catches drift between them.
mcp_servers = {memory = {command = "npx", args = ["-y", "@modelcontextprotocol/server-memory"], env = {MEMORY_FILE_PATH = "/mngr/code/runtime/memory/memory.jsonl"}}}
# The only reliable skip-permissions mechanism for agy: adds
# --dangerously-skip-permissions. NOT a hook -- agy's documented PreToolUse
# {"decision":"allow"} output does not actually gate the run_command
# confirmation dialog (verified live against agy 1.0.3), so this dedicated
# field is the sole mechanism that reliably auto-approves.
auto_allow_permissions = true
# Auto-trust the source repo in agy's global trustedWorkspaces without
# prompting, mirroring claude's/codex's auto_dismiss_dialogs.
auto_dismiss_dialogs = true
# Don't seed this agent's settings.json from the OPERATOR's real
# ~/.gemini/antigravity-cli/settings.json -- the repo at the requested git
# ref is the canonical workspace definition, same intent as claude-main's
# sync_home_settings=false. Set at the base type (not a "-main" override)
# because antigravity has no live-sharing "-main" role to scope it to --
# every antigravity agent needs this, not just one.
sync_home_settings = false
# enableTelemetry is antigravity's entire opt-out surface -- confirmed live
# against a real authenticated install; no autoUpdate/feedbackEnabled/
# crashReport equivalents exist anywhere in the settings schema.
# model: "Gemini 3.5 Flash (High)" -- confirmed real via a live `agy models`
# call (re-checked, not stale). Note this is Flash-tier, not Pro-tier: the
# only 3.5 option that exists is "Gemini 3.5 Flash"; "Gemini 3.5 Pro" is
# not a real selectable value today, only "Gemini 3.1 Pro" is (the
# previous pick here, before 3.5 was explicitly requested instead).
# Antigravity encodes effort into the model name itself (no separate
# effort field exists), so "(High)" is both the model pick and the effort
# pick at once.
settings_overrides__extend = {enableTelemetry = false, model = "Gemini 3.5 Flash (High)"}
# No AGENTS.md workaround needed here: confirmed via agy's own bundled docs
# (strings in the installed binary) that it already walks up from cwd to the
# repo root discovering GEMINI.md/AGENTS.md natively, the same as codex/
# opencode -- an earlier pass here wrongly assumed it didn't and added a
# global_instructions_md workaround; removed (see mngr_antigravity's changelog).
# agy has no version-pinning capability at all (Google's installer always
# installs latest from a manifest); freeze the installed build instead.
update_policy = "NEVER"

# The "antigravity-main" (services) agent type. Like codex, antigravity has
# NO isolate_local_config_dir equivalent -- per-agent $HOME relocation is
# always unconditional, no toggle -- so every antigravity agent (including
# this one) is permanently isolated. Only auth is shared, via agy's
# symlink_oauth_token (on by default).
[agent_types.antigravity-main]
parent_type = "antigravity"
command = "bash -c 'exec sleep infinity' --"

# the "antigravity-worker" agent type -- the default for delegated antigravity tasks
[agent_types.antigravity-worker]
parent_type = "antigravity"

# --- Agent types: opencode ---

# Agent type defaults -- apply to all opencode agents created from this repo.
[agent_types.opencode]
# Dedicated field, confirmed to exist: auto-approves everything not
# explicitly denied. The real analog of --dangerously-skip-permissions, not
# just enumerating every action in config_overrides.permission by hand.
auto_allow_permissions = true
# Shut-up + tool-restriction settings, confirmed against the live schema at
# opencode.ai/config.json:
#  - autoupdate: solid, confirmed working.
#  - experimental.openTelemetry / share: set, but openTelemetry suppression
#    may still leak some traffic (reported in a live GitHub issue) -- no
#    env-var kill switch exists for it specifically, unlike autoupdate/share
#    which do have OPENCODE_DISABLE_* env var alternatives if ever needed.
#  - tools: opencode's real disallow-list mechanism (the only one of the
#    three non-claude harnesses that has one) -- todowrite/question/task
#    are the closest real analogs to claude's TodoWrite/AskUserQuestion/
#    Task-family, though the mapping is inexact by necessity (different
#    tool surface); no ExitPlanMode analog exists to disable.
# model: "openrouter/z-ai/glm-5.2" confirmed real via `opencode models` --
# opencode also serves glm-5.2 through its own "opencode/" gateway, but
# "openrouter/z-ai/glm-5.2" matches the actual OpenRouter routing requested.
# No effort-level override set here: fetched opencode's real, current
# config schema (opencode.ai/config.json) directly and confirmed there is
# no "reasoningEffort" field at all (an earlier research pass claiming one
# existed was wrong) -- the real per-agent field is "variant", with no
# confirmed valid values for this model, so nothing was set rather than
# guessing one.
# KEEP IN SYNC: hand-duplicated 4x total -- also at settings.toml's codex
# and antigravity blocks, and .mcp.json (claude, which can't hold a
# comment pointing back here since JSON has no comment syntax). No test
# catches drift between them.
config_overrides__extend = {model = "openrouter/z-ai/glm-5.2", autoupdate = false, experimental = {openTelemetry = false}, share = "disabled", tools = {todowrite = false, question = false, task = false}, mcp = {memory = {type = "local", command = ["npx", "-y", "@modelcontextprotocol/server-memory"], environment = {MEMORY_FILE_PATH = "/mngr/code/runtime/memory/memory.jsonl"}}}}
# Don't seed this agent's opencode.json from the operator's real
# ~/.config/opencode/opencode.json -- same reproducibility intent as
# claude-main's sync_home_settings=false / antigravity's sync_home_settings.
sync_global_config = false
# Pin the opencode version; provisioning verifies the installed opencode
# matches, erroring on a mismatch.
version = "1.17.13"
# TEMPORARY: fetches the code-guardian review-gate opencode plugin from a
# personal fork + PR branch (https://github.com/imbue-ai/code-guardian/pull/25),
# not the canonical repo -- same reasoning as codex/antigravity's
# *_update_plugin*.sh (see those files' headers). opencode has no
# "install" ceremony of its own -- it just loads whatever .ts sits in
# .opencode/plugin/ -- and bun (opencode's runtime) does NOT support
# installing a git dependency from a subdirectory of a repo (confirmed via
# an open, unresolved oven-sh/bun issue #15506), so an npm-style git
# specifier can't target this nested plugin directly. Fetching the raw
# file from GitHub's own first-party raw-content CDN sidesteps that
# entirely -- no npm packaging, no third-party proxy service needed.
# SWITCH BACK to a real published npm package (or the canonical repo's
# raw URL once merged) as the follow-up.
extra_provision_command__extend = [
    "curl -fsSL https://raw.githubusercontent.com/minhtrinh-imbue/code-guardian/add-codex-opencode-antigravity-support/plugins/imbue-code-guardian-opencode/index.ts -o .opencode/plugin/imbue-code-guardian-reviewer-gate.ts",
]

# The "opencode-main" (services) agent type. Like codex/antigravity, opencode
# has NO cross-agent OPENCODE_CONFIG_DIR sharing field -- sync_global_config
# only seeds a one-time copy from the operator's real config, not a live
# shared dir other agents point at -- so every opencode agent (including
# this one) is permanently isolated. Only auth is shared, via opencode's
# symlink_auth (on by default).
[agent_types.opencode-main]
parent_type = "opencode"
command = "bash -c 'exec sleep infinity' --"

# the "opencode-worker" agent type -- the default for delegated opencode tasks
[agent_types.opencode-worker]
parent_type = "opencode"

# --- Provider configurations ---

# all disabled for now, since we don't want the agents to be able to launch mngr agents anywhere except within their own containers

[providers.modal]
is_enabled = false

[providers.docker]
is_enabled = false
isolate_host_volumes = true
# No `docker_runtime` is set here, so containers use Docker's default runtime
# (runc), which is available everywhere -- notably macOS, where gVisor's `runsc`
# is not. The gVisor-hardened runtime is selected per-create by stacking the
# `docker_runsc` template overlay below (the minds desktop app does this by
# default on Linux, where `runsc` is installed). A direct CLI user can opt in
# with `--template docker --template docker_runsc`, or override either way with
# MNGR__PROVIDERS__DOCKER__DOCKER_RUNTIME=<runc|runsc>.
# Mount /run as a tmpfs so supervisord can install its control socket. When runsc
# is registered with --overlay2=none (required so the container rootfs -- and
# mngr's SSH provisioning written to it -- survives a restart), /run lives on
# gVisor's gofer-backed filesystem, which returns EOPNOTSUPP for os.link() of a
# socket inode. supervisord installs its control socket via a hard link, so on a
# gofer-backed /run it wedges ("Unlinking stale socket") and never starts
# system_interface -- the workspace then sits on the "Loading workspace" loader
# forever. A tmpfs /run makes the hard link work. Mirrors the tmpfs /run that the
# aws-<region> provider start args and the ovh/vultr/imbue_cloud host setup apply.
default_start_args = ["--tmpfs", "/run"]

[providers.lima]
# is_enabled=false (mirrors [providers.docker]) is load-bearing: the lima backend
# is a plugin (imbue-mngr-lima) that is NOT installed in the agent container, so a
# *parsed* lima block would crash the in-container mngr with "unknown backend
# 'lima'". With is_enabled=false the config loader skips the whole block wherever
# the lima plugin is absent (the container), while the host-side mngr (which has
# the plugin) still parses it. The lima create still works because `@<name>.lima`
# resolves the provider by name regardless of is_enabled (same as @<name>.docker).
is_enabled = false
# Run the minds workspace directly in the Lima VM as root (uid 0) -- no nested
# Docker container. is_run_as_root gives the agent the same "no sudo, install
# anything" posture it has inside a docker/vps_docker container (the VM is the
# isolation boundary). Root cannot traverse the 9p bind mount, so is_run_as_root
# requires the in-VM btrfs additional-disk layout: is_host_data_volume_exposed
# must be false. These live on the provider block (not the lima template's
# setting__extend) because template `--setting` entries don't reach provider
# config (imbue-ai/mngr#1914).
is_host_data_volume_exposed = false
is_run_as_root = true

# vultr VPS provider (cloud mode). is_enabled=false mirrors the lima/docker blocks:
# the vps_docker backend plugin is not installed in the agent container, so a parsed
# block would crash the in-container mngr; with is_enabled=false the loader skips the
# block where the plugin is absent, while the host-side mngr (which runs the bake)
# still parses it. The vultr create still works because `@<name>.vultr` resolves the
# provider by name regardless of is_enabled. runsc is installed+registered at
# provisioning time and selected for the agent container; the matching `--workdir=/`
# and `--security-opt=no-new-privileges` run args are added in the vultr template's
# start_arg (which, unlike lima, reaches the inner `docker run`).
[providers.vultr]
is_enabled = false
install_gvisor_runtime = true
docker_runtime = "runsc"

# OVH VPS provider (the imbue-cloud pool-bake's default). Same rationale as the
# vultr block above; the `--workdir=/` / `--security-opt=no-new-privileges` run args
# are added in the ovh template's start_arg.
[providers.ovh]
is_enabled = false
install_gvisor_runtime = true
docker_runtime = "runsc"

# --- Create templates ---

## these are all for launching the original agent (from outside the sandbox, in the first place)

# The template shared across all agent types and all harnesses -- no `type`
# here on purpose. mngr has no template-level inheritance (only agent_types
# has parent_type), so a caller must stack this with a main_<harness>
# overlay below to get a working "main"/services agent, e.g.
# `--template main --template main_codex`. Both flags must be passed
# explicitly, every time; nothing links them automatically.
[create_templates.main]
# `/welcome` is still NOT set here: the services agent's window 0 sleeps forever
# (see the claude-main/codex-main/antigravity-main/opencode-main `command`
# fields) and never reaches an interactive CLI. The bootstrap creates a
# separate chat agent on first boot and passes `--message /welcome` to it
# instead (read FCT_HARNESS to know which harness's `chat_<harness>`
# template and welcome behavior to use -- see libs/bootstrap).
#
# bootstrap is the only extra_window now. It runs first-boot setup (git config,
# runtime worktree, CLAUDE_CONFIG_DIR host-env write, backup config, initial
# chat agent) and then launches supervisord, which runs every background
# service (system_interface, web, cloudflared, app-watcher, runtime-backup,
# host-backup, terminal, and the one-shot deferred-install -- see
# supervisord.conf). The old git_auth_setup window is gone (the git config it
# performed now runs inside bootstrap), and terminal is a supervisord service
# rather than its own window.
extra_window = ["bootstrap='uv run bootstrap'"]
# Write a sane default tmux config on every minds host. tuple-typed
# `extra_provision_command` stacks across templates (see
# `apply_create_template` in vendor/mngr/.../common_opts.py), so the
# mode-specific templates (docker/lima/...) keep their own commands.
#
# `mouse on` keeps wheel scroll and in-app mouse working in the browser
# terminal. The clipboard lines make a plain mouse-drag copy reach the system
# clipboard via OSC 52: `set-clipboard on` tells tmux to emit it,
# `terminal-features ,*:clipboard` makes tmux believe the terminal accepts it,
# and the copy-mode bindings copy-and-emit on drag-release. This relies on the
# mngr_ttyd plugin serving an OSC 52-capable web client (the stock ttyd client
# drops these escapes); see libs/mngr_ttyd in the mngr repo.
#
# The final `if-shell ... source-file` line pulls in scripts/terminal_tmux.conf
# (committed to /mngr/code), which holds the in-memory-persistent-terminals
# settings: a larger history-limit, window-size latest, and the tab-title
# tracking hooks. It lives in its own file so those hook lines stay readable.
extra_provision_command__extend = [
    '''printf '%s\n' 'set -g alternate-screen off' 'set -g mouse on' 'set -g set-clipboard on' 'set -as terminal-features ,*:clipboard' 'bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel' 'bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel' 'if-shell "test -f /mngr/code/scripts/terminal_tmux.conf" "source-file /mngr/code/scripts/terminal_tmux.conf"' > "$HOME/.tmux.conf"''',
    # Ensure the shared memory MCP server's data directory exists before any
    # harness's memory-server subprocess tries to write memory.jsonl there.
    "mkdir -p /mngr/code/runtime/memory",
]

# Per-harness "-main" overlays -- each just sets `type` and FCT_HARNESS,
# stacked on top of [create_templates.main] above (never used alone). All
# four are the same shape; claude gets no naming privilege.
[create_templates.main_claude]
type = "claude-main"
env = ["FCT_HARNESS=claude"]

[create_templates.main_codex]
type = "codex-main"
env = ["FCT_HARNESS=codex"]

[create_templates.main_antigravity]
type = "antigravity-main"
env = ["FCT_HARNESS=antigravity"]

[create_templates.main_opencode]
type = "opencode-main"
env = ["FCT_HARNESS=opencode"]

# Shared base template for the local docker provider. Used on its own for the
# default (runc) runtime; stack `--template docker_runsc` on top of it to select
# the gVisor (runsc) runtime instead (see that overlay below and the
# [providers.docker] note above). The container-runtime choice is the only
# difference between the two, so the body lives here once and the overlay reuses
# it -- nothing to keep in sync.
[create_templates.docker]
provider = "docker"
target_path = "/mngr/code/"
setting__extend = ["providers.docker.is_enabled=true"]
build_arg__extend = ["--file=Dockerfile", "."]
# Security hardening for `docker run`: block privilege escalation via setuid
# binaries. `--cap-add=SYS_PTRACE` was removed deliberately -- gVisor is the
# isolation boundary now, and the extra capability widened the container's
# privileges with no upside for untrusted agents.
#
# `--workdir=/` overrides the image's `WORKDIR /mngr/code` for the container's
# idle entrypoint. Under gVisor (runsc), sandbox startup tries to create the
# process working directory and aborts with "file exists" when it already
# exists -- and `/mngr/code` exists inside the mounted `/mngr` volume. runc
# tolerates a pre-existing cwd; runsc does not. Pointing the cwd at `/` (always
# present) sidesteps it; nothing depends on the host container's default cwd
# (the entrypoint just sleeps; agents set their own work_dir=/mngr/code).
#
# `--restart=unless-stopped` brings the container back after a docker daemon
# restart or host reboot; the container entrypoint then self-heals sshd, so the
# host is reachable again without a manual `mngr start`. The agent itself is
# relaunched by the minds desktop client in this (debugging-oriented) mode.
start_arg__extend = ["--security-opt=no-new-privileges", "--workdir=/", "--restart=unless-stopped"]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"
# Forward Anthropic creds + GH_TOKEN from minds' subprocess env onto the
# new container's env. The agent process inherits the container env, so
# this is what gives the agent its ANTHROPIC_API_KEY (etc.) in
# non-IMBUE_CLOUD compute modes.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Seed /mngr/code from /docker_build_code (baked into the image) onto the
# per-host volume. Runs synchronously after the host is online but
# before any agent work_dir setup, so the workspace is in place by the
# time the user's git refs land on top. See scripts/fct_seed.sh.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]

# gVisor (runsc) runtime overlay for the docker provider. Always stacked on top
# of `docker` (`--template docker --template docker_runsc`): it reuses the entire
# docker template body and only switches the provider's container runtime to
# `runsc`, shrinking the host kernel attack surface for untrusted agents. `runsc`
# must be installed + registered with the local Docker daemon (see CLAUDE.md);
# container creation fails with Docker's native "unknown runtime" error
# otherwise -- which is why this is opt-in rather than the default. The
# template-contributed provider-config setting reaches the provider at create
# time: mngr re-applies template `--setting` entries against the provider config
# after template resolution (imbue-ai/mngr#1914).
[create_templates.docker_runsc]
setting__extend = ["providers.docker.docker_runtime=runsc"]

# template for lima VM provider
[create_templates.lima]
provider = "lima"
target_path = "/mngr/code/"
idle_mode = "disabled"
start_arg__extend = ["--cpus=2", "--memory=4", "--disk=20"]
# Mirror the docker template: flip the (default-disabled) lima provider on for
# this create. Redundant in practice -- `@<name>.lima` resolves the provider by
# name regardless of is_enabled -- but kept for parity/intent with docker.
# (Docker-in-Lima mode and its is_host_in_docker provider config are gone; the
# agent now runs directly in the VM as root -- see [providers.lima]. Offline
# reads via `mngr event` / `mngr transcript` against a stopped Lima host do not
# work in the btrfs layout until the host is started.)
#
# The pinned claude binary is installed on the fresh VM during provisioning by
# the claude plugin itself (is_remote_agent_installation_allowed defaults to
# True, so a missing remote claude is auto-installed at the pinned version);
# setup_system.sh below then re-installs it as part of the full toolchain. No
# version-check disable is needed.
setting__extend = ["providers.lima.is_enabled=true"]
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Run the SAME setup as a Dockerfile-built workspace, directly in the VM as root.
# These run after the project is synced to /mngr/code (agent-level provisioning,
# post work_dir sync) and reuse the exact scripts the Dockerfile RUNs. There is
# no docker build (so no `--file=Dockerfile` build arg) and no /docker_build_code
# relocation (the repo lands straight on the VM's btrfs /mngr disk), so the
# docker template's build_arg + post_host_create_command (fct-seed) are
# intentionally absent here. extra_provision_command__extend stacks after the
# main template's entry.
extra_provision_command__extend = [
    "bash /mngr/code/scripts/setup_system.sh",
    "bash /mngr/code/scripts/install_dependencies.sh",
    "bash /mngr/code/scripts/build_workspace.sh",
    # Install a systemd unit that relaunches the system-services agent on VM
    # boot, so the workspace recovers from a VM reboot even when the minds
    # desktop app is not running. The agent runs directly in the VM here, so
    # this runs `mngr start system-services` in the VM (mngr is installed by
    # build_workspace.sh above).
    "bash /mngr/code/scripts/minds_lima_autostart.sh",
]

# template for vultr VPS provider (cloud mode)
[create_templates.vultr]
provider = "vultr"
target_path = "/mngr/code/"
# ``--vps-region=sjc`` (Silicon Valley) instead of the mngr_vultr default
# ``ewr`` (Newark) -- imbue's operators run the bake from west-coast
# machines, and the New Jersey region routinely produced ~1s SSH RTTs
# and ~1.6 MB/s effective rsync throughput, which combined with the
# ~1500-file build context made the cold upload time out at 10 minutes.
# Keeping the default change at the template level so every minds /
# imbue_cloud-pool create lands in the same place; CLI users who want
# a different region can still override per-invocation with
# ``-b --vps-region=<other>``.
build_arg__extend = ["--file=Dockerfile", "--vps-plan=vc2-2c-4gb", "--vps-region=sjc", "."]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"
# gVisor runsc hardening for the agent container, matching the docker template.
# runsc itself is installed+selected on the [providers.vultr] block above; these
# `docker run` args go via start_arg (vps_docker forwards start_arg to the inner
# `docker run`): `--workdir=/` (runsc aborts when the image WORKDIR /mngr/code,
# inside the mounted /mngr volume, already exists as the process cwd) and
# `--security-opt=no-new-privileges`. `--restart=unless-stopped` brings the
# agent container back after a VPS reboot; the entrypoint then self-heals sshd.
start_arg__extend = ["--security-opt=no-new-privileges", "--workdir=/", "--restart=unless-stopped"]
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Same first-boot seed as the docker template; see comment there.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]
# Install the outer-VM boot unit so the agent recovers after a VPS reboot even
# without the desktop app; same as the pool_host template..
post_host_create_outer_command__extend = [
    """
set -eu
cat > /usr/local/sbin/minds-outer-autostart.sh <<'BOOT'
#!/bin/sh
# On VM boot, start every mngr-managed agent container and relaunch the
# system-services agent inside it (in its full host+agent env, via the shared
# in-container start script). Containers are found by the fixed mngr label, so
# this survives container rebuilds. `docker start` is a no-op if the container's
# --restart policy already brought it back; `mngr start` is idempotent + flock-
# serialized, so racing the desktop client is safe.
set -u
for cid in $(docker ps -aq --filter "label=com.imbue.mngr.host-id"); do
    docker start "$cid" >/dev/null 2>&1 || true
    docker exec --workdir / "$cid" bash -lc 'exec /mngr/code/scripts/minds_start_services_agent.sh' || true
done
BOOT
chmod +x /usr/local/sbin/minds-outer-autostart.sh
cat > /etc/systemd/system/minds-autostart.service <<'UNIT'
[Unit]
Description=Start the minds system-services agent on boot
After=docker.service
Requires=docker.service

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/usr/local/sbin/minds-outer-autostart.sh

[Install]
WantedBy=multi-user.target
UNIT
systemctl daemon-reload
systemctl enable minds-autostart.service
""",
]

# Modal provider template. Was missing entirely -- minds' agent_creator.py
# (apps/minds/.../agent_creator.py) already stacks `--new-host --template main
# --template modal` for MODAL-mode creates ("Same remote shape as vultr/aws:
# the main + modal templates"), so this fills a real, pre-existing gap, not
# something new agent_creator.py needed to learn about.
#
# NOT a copy-paste of vultr/aws: those SSH into a persistent VM and run
# `docker run` inside it (hence their `start_arg` docker-run flags and
# `post_host_create_outer_command` systemd VM-reboot-recovery script). Modal
# is a serverless sandbox -- mngr_modal builds the image and runs it directly
# via Modal's own SDK (see instance.py's `_build_image_from_dockerfile_contents`),
# no SSH-to-a-VM layer exists to reboot or wrap `docker run` around. Those two
# VM-specific mechanisms are deliberately omitted rather than carried over
# unverified; everything kept below (`target_path`, `build_arg`, `idle_mode`,
# `pass_host_env`, `post_host_create_command`) is a generic, provider-agnostic
# mngr create-template field (confirmed in imbue.mngr.config.data_types, not
# provider-plugin-specific code), so it applies the same way here as it does
# on every other provider template in this file.
[create_templates.modal]
provider = "modal"
target_path = "/mngr/code/"
build_arg__extend = ["--file=Dockerfile", "."]
# Disable idle detection entirely -- the host should never auto-shutdown.
idle_mode = "disabled"
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Same first-boot seed as the docker template; see comment there.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]

# Provider-agnostic FCT pool-host build recipe (the imbue-cloud pool bake stacks
# this on top of `main` for BOTH OVH VPSes and lima slices -- they build the same
# container image). No `provider` is declared: the create address selects it
# (`@host.ovh` for OVH, `@host.imbue_cloud_slice` for a slice), mirroring the
# `aws` / `imbue_cloud` templates. Declaring `provider = "ovh"` here used to make
# slice bakes fail ("conflicting providers": the slice address vs this template).
[create_templates.pool_host]
target_path = "/mngr/code/"
# No plan / datacenter / sizing baked in: each pool-bake path appends its own per
# invocation -- the OVH backend appends ``-b --vps-datacenter=<region>`` (plan
# defaults from ``OvhProviderConfig.default_plan``), the slice backend passes the
# box address + per-slice carve sizing via ``-S providers.imbue_cloud_slice.*``.
build_arg__extend = ["--file=Dockerfile", "."]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"
# gVisor runsc hardening for the agent container; see the vultr template comment.
# runsc is installed+selected by the chosen provider (the OVH/vultr provider block,
# or the slice VM's own provisioning).
#
# `--restart=unless-stopped` brings the agent container back after a pool-VM
# reboot; the container entrypoint then self-heals sshd. The agent itself is
# relaunched by the outer boot unit installed below.
start_arg__extend = ["--security-opt=no-new-privileges", "--workdir=/", "--restart=unless-stopped"]
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Same first-boot seed as the docker template; see comment there.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]
# Install a systemd unit on the OUTER pool/slice VM that, on every VM boot,
# starts the agent container and relaunches the system-services agent inside it
# -- so the workspace recovers from a VM reboot even when the minds desktop app
# is not running. Runs once on the VM (post_host_create_command / fct-seed has
# already seeded /mngr/code in the container, so the installer can be copied out
# of it). The unit persists across leases and container rebuilds (it finds the
# container by mngr label, not by name).
post_host_create_outer_command__extend = [
    """
set -eu
cat > /usr/local/sbin/minds-outer-autostart.sh <<'BOOT'
#!/bin/sh
# On VM boot, start every mngr-managed agent container and relaunch the
# system-services agent inside it (in its full host+agent env, via the shared
# in-container start script). Containers are found by the fixed mngr label, so
# this survives container rebuilds. `docker start` is a no-op if the container's
# --restart policy already brought it back; `mngr start` is idempotent + flock-
# serialized, so racing the desktop client is safe.
set -u
for cid in $(docker ps -aq --filter "label=com.imbue.mngr.host-id"); do
    docker start "$cid" >/dev/null 2>&1 || true
    docker exec --workdir / "$cid" bash -lc 'exec /mngr/code/scripts/minds_start_services_agent.sh' || true
done
BOOT
chmod +x /usr/local/sbin/minds-outer-autostart.sh
cat > /etc/systemd/system/minds-autostart.service <<'UNIT'
[Unit]
Description=Start the minds system-services agent on boot
After=docker.service
Requires=docker.service

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/usr/local/sbin/minds-outer-autostart.sh

[Install]
WantedBy=multi-user.target
UNIT
systemctl daemon-reload
systemctl enable minds-autostart.service
""",
]

# template for AWS EC2 VPS provider (aws mode)
[create_templates.aws]
target_path = "/mngr/code/"
# No `provider` declared: minds addresses the create as
# `system-services@<host>.aws-<region>`, which selects the region-specific
# `[providers.aws-<region>]` block minds writes into its mngr profile settings
# at startup (mirroring how the imbue_cloud template omits `provider` and lets
# the `imbue_cloud_<slug>` address pick the instance). No region or instance
# type is baked in: the region comes from the provider block's `default_region`
# (and the matching `-b --aws-region=` minds passes), the instance type from
# `AwsProviderConfig.default_instance_type`.
build_arg__extend = ["--file=Dockerfile", "."]
# Disable idle detection entirely -- the host should never auto-shutdown. The
# AWS provider's `auto_shutdown_seconds` max-lifetime cap is also left unset
# (the minds-written provider blocks don't set it), so the EC2 instance stays
# up for the whole user session rather than self-terminating after a timeout.
idle_mode = "disabled"
# gVisor runsc hardening for the agent container, matching the vultr/ovh
# templates. runsc is installed+selected via `install_gvisor_runtime` /
# `docker_runtime` on the minds-written `[providers.aws-<region>]` blocks; these
# `docker run` args go via start_arg (vps_docker forwards start_arg to the inner
# `docker run`): `--workdir=/` (runsc aborts when the image WORKDIR /mngr/code,
# inside the mounted /mngr volume, already exists as the process cwd) and
# `--security-opt=no-new-privileges`. `--restart=unless-stopped` brings the
# agent container back after an EC2 reboot; the entrypoint then self-heals sshd.
start_arg__extend = ["--security-opt=no-new-privileges", "--workdir=/", "--restart=unless-stopped"]
# Same forwarding as the docker template; see comment there.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "GH_TOKEN"]
# Same first-boot seed as the docker template; see comment there.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]
# Install the outer-VM boot unit so the agent recovers after an EC2 reboot even
# without the desktop app; same as the pool_host template..
post_host_create_outer_command__extend = [
    """
set -eu
cat > /usr/local/sbin/minds-outer-autostart.sh <<'BOOT'
#!/bin/sh
# On VM boot, start every mngr-managed agent container and relaunch the
# system-services agent inside it (in its full host+agent env, via the shared
# in-container start script). Containers are found by the fixed mngr label, so
# this survives container rebuilds. `docker start` is a no-op if the container's
# --restart policy already brought it back; `mngr start` is idempotent + flock-
# serialized, so racing the desktop client is safe.
set -u
for cid in $(docker ps -aq --filter "label=com.imbue.mngr.host-id"); do
    docker start "$cid" >/dev/null 2>&1 || true
    docker exec --workdir / "$cid" bash -lc 'exec /mngr/code/scripts/minds_start_services_agent.sh' || true
done
BOOT
chmod +x /usr/local/sbin/minds-outer-autostart.sh
cat > /etc/systemd/system/minds-autostart.service <<'UNIT'
[Unit]
Description=Start the minds system-services agent on boot
After=docker.service
Requires=docker.service

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/usr/local/sbin/minds-outer-autostart.sh

[Install]
WantedBy=multi-user.target
UNIT
systemctl daemon-reload
systemctl enable minds-autostart.service
""",
]

# Template for imbue_cloud-leased pool hosts. minds invokes this as
# `--template main --template imbue_cloud` (mirroring how the other modes
# use `--template main --template <provider>`), so the imbue_cloud-specific
# knobs that used to be inlined in `_build_mngr_create_command` live here
# instead. The actual provider name on the address is per-account
# (`imbue_cloud_<account-slug>`), so it's not declared here -- the
# `<name>@<host>.imbue_cloud_<slug>` address tells mngr where to land.
[create_templates.imbue_cloud]
# Leased pool hosts must never auto-shutdown -- the host is borrowed for a
# whole user session, not a one-shot job.
idle_mode = "disabled"
# The agent workspace lives on the persistent volume at /mngr/code/. The fast
# (adopt) path ignores this -- it reuses the pre-baked agent's recorded
# work_dir -- but the slow (rebuild) path rebuilds the container from scratch
# and needs the standard target_path so the FCT workspace lands in the right
# place, exactly like the vultr/ovh templates.
target_path = "/mngr/code/"
# Docker build args forwarded verbatim to the delegated vps_docker build that
# the imbue_cloud SLOW path runs (it tears down the leased pool host's baked
# container and rebuilds it from this Dockerfile). The FAST path adopts the
# pre-baked image and ignores these (the imbue_cloud provider treats them as
# pass-through and only the slow path consumes them). Mirrors the ovh template.
build_arg__extend = ["--file=Dockerfile", "."]
# `--restart=unless-stopped` on the inner agent container so a slow-path rebuild
# (which recreates the container) comes back after a pool-VM reboot, matching the
# baked container from the pool_host template. The fast (adopt) path reuses the
# pre-baked container, which already carries this policy.
start_arg__extend = ["--restart=unless-stopped"]
# Forward the LiteLLM-minted ANTHROPIC creds + the minds-side MNGR_PREFIX
# + an optional GH_TOKEN from minds' subprocess env onto the host's
# ``/mngr/env``. minds writes these into the subprocess env it hands
# ``mngr create`` (see ``run_mngr_create`` in
# ``vendor/mngr/apps/minds/imbue/minds/desktop_client/agent_creator.py``)
# so the host actually has them at the moment ``--pass-host-env`` reads.
pass_host_env__extend = ["ANTHROPIC_API_KEY", "ANTHROPIC_BASE_URL", "MNGR_PREFIX", "GH_TOKEN"]
# Seed /mngr/code from the baked image on first boot (idempotent warm-boot
# fast path). Runs after create_host for both paths; on the fast path the
# code is already present so fct-seed is a no-op. Same as the vultr/ovh
# templates.
post_host_create_command__extend = ["/usr/local/bin/fct-seed"]

## and these templates are for sub-agents created within the sandbox

# Chat templates: minimal agent for additional chat sessions in the same work
# directory, one per harness. Worktree agents (below) run the plain harness
# type (not the "-main" type), so they run a real CLI process and share the
# services agent's config where that harness supports sharing (claude only).
[create_templates.chat]
# Bare-named alias to chat_claude, restored after code review found it
# broke apps/system_interface/imbue/system_interface/agent_manager.py's
# _build_chat_create_command, which hardcodes "--template chat" for the
# "New chat" button (untouched by this session's harness work, out of
# scope to rewrite here) -- and any other caller that predates the
# harness-suffix convention. create_templates don't support inheritance
# (unlike agent_types' parent_type), so this is a real duplicate of
# chat_claude, not a reference -- keep both in sync if either changes.
type = "claude"

[create_templates.chat_claude]
type = "claude"

[create_templates.chat_codex]
type = "codex"

[create_templates.chat_antigravity]
type = "antigravity"

[create_templates.chat_opencode]
type = "opencode"

# Worktree templates: agent in a new git worktree, no services by default --
# creates its own as needed. One per harness, same shape as chat_<harness>.
[create_templates.worktree]
# Bare-named alias to worktree_claude -- same reasoning as create_templates.chat
# above (agent_manager.py's _build_worktree_create_command hardcodes
# "--template worktree" for the "New worktree agent" button).
type = "claude"

[create_templates.worktree_claude]
type = "claude"

[create_templates.worktree_codex]
type = "codex"

[create_templates.worktree_antigravity]
type = "antigravity"

[create_templates.worktree_opencode]
type = "opencode"

# Worker templates: general purpose sub agent for doing tasks reliably (and
# ensuring that they are verified), one per harness. Reviewer window/env is
# identical across all four; agent_args is only needed on claude/antigravity
# to add the skip-permissions CLI flag -- codex/opencode's base
# auto_allow_permissions already covers it, no flag needed on invocation.
# The "you were launched by another agent" instruction used to be delivered
# here too, via claude's --append-system-prompt -- but codex/antigravity/
# opencode have no confirmed equivalent CLI flag (found during the
# functionality-matrix audit), and even where a candidate exists
# (opencode's AgentConfig.prompt) its append-vs-replace semantics are
# undocumented, too risky to set blind. Moved to a real, harness-agnostic
# mechanism instead: .agents/skills/launch-task/scripts/create_worker.py's
# launch() now prepends it to the task message it already sends (one
# merged `mngr message --message-file`, not a separate call -- avoids
# paying CLI startup + agent resolution twice), for every worker on every
# harness, from the one shared choke point all six delegation skills
# launch workers through -- no per-harness CLI flag needed at all.
[create_templates.worker]
# Bare-named alias to worker_claude, restored after code review found it
# broke six delegation skills (launch-task, crystallize-artifact,
# update-artifact, heal-artifact, update-system-interface, use-ai-integration)
# that hardcode "--template worker" in their SKILL.md-driven scripts,
# predating the harness-suffix convention and out of scope to rewrite here.
