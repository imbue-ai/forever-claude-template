# Subskill-worker templates: sub-agent for any flow that hands its worker the
# generic harden worker -- the crystallize-artifact / update-artifact /
# heal-artifact lifecycle (across skills, services, and the system interface).
# Same shape as worker_<harness> above, plus:
#  - MNGR_AGENT_ROLE=worker so the harden Stop hook skips in-worker.
#  - A pre-provision step that installs the single generic worker sub-skill from
#    .agents/shared/worker/ into the worker's .agents/skills/ tree as
#    `harden-worker`. The worker reads the operation + artifact from its task
#    file and composes the matching references.
[create_templates.subskill-worker]
# Bare-named alias to subskill-worker_claude -- same reasoning as
# create_templates.worker above.
type = "claude-worker"
extra_window = ["reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR $REVIEWER_VERIFY_ARCHITECTURE_ENABLE $REVIEWER_STOP_HOOK_ENABLE'"]
env = ["REVIEWER_AUTOFIX_ENABLE=1", "REVIEWER_CI_ENABLE=1", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0", "REVIEWER_VERIFY_ARCHITECTURE_ENABLE=1", "REVIEWER_STOP_HOOK_ENABLE=1", "MNGR_AGENT_ROLE=worker"]
extra_provision_command = [
    "bash .agents/shared/scripts/install_worker_skills.sh .agents/skills",
]
agent_args = [
    "--dangerously-skip-permissions",
]

[create_templates.subskill-worker_claude]
