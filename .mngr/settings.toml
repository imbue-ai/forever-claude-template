# --- Command defaults ---

# Default create command settings -- apply to all mngr create from this repo
[commands.create]
connect = false
ensure_clean = false
pass_env = ["MINDS_WORKSPACE_NAME", "ANTHROPIC_API_KEY", "TELEGRAM_BOT_TOKEN", "TELEGRAM_USER_NAME", "REMOTE_SERVICE_CONNECTOR_URL"]
env = [
    "IS_SANDBOX=1",
    "IS_AUTONOMOUS=1",
    # Lock Claude Code to the version pinned in agent_types.claude.version and the
    # Dockerfile's CLAUDE_CODE_VERSION; disable the auto-updater + background
    # feedback pings so the installed binary cannot silently drift. Tracks the
    # FIXME on ClaudeAgentConfig.version in libs/mngr_claude/.../plugin.py.
    "DISABLE_AUTOUPDATER=1",
    "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1",
    "CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY=1",
]
worktree_base_folder = "/worktree/"
disable_plugin = ["recursive", "ttyd"]
yes = true

# for the list command -- ensures that we don't see other agents when we're listing, even if we happen to list remote agents
[commands.list]
include = ["""has(labels.workspace)"""]

# --- Agent types ---

# Agent type defaults -- apply to all claude agents created from this repo
[agent_types.claude]
auto_dismiss_dialogs = true
auto_allow_permissions = true
cli_args = """--dangerously-skip-permissions"""
settings_overrides = {model = "opus[1m]", fastMode = true}
# Pin Claude Code to a specific version; the provisioning-time version check
# refuses to start the agent if the installed binary diverges. Bump this in
# sync with CLAUDE_CODE_VERSION in the Dockerfile.
version = "2.1.116"

# The "main" agent type -- inherits everything from claude
[agent_types.main]
parent_type = "claude"

# the "worker" agent type -- the default for delegated tasks
[agent_types.worker]
parent_type = "claude"

# --- Provider configurations ---

# all disabled for now, since we don't want the agents to be able to launch mngr agents anywhere except within their own containers

[providers.modal]
is_enabled = false

[providers.docker]
is_enabled = false

# --- Create templates ---

## these are all for launching the original agent (from outside the sandbox, in the first place)

# the template that is shared across all agent types
[create_templates.main]
type = "main"
env = ["REVIEWER_AUTOFIX_ENABLE=0", "REVIEWER_CI_ENABLE=0", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0", "REVIEWER_VERIFY_ARCHITECTURE_ENABLE=0"]
extra_window = [
    "bootstrap='uv run bootstrap'",
    "telegram='uv run telegram-bot'",
    "terminal='bash scripts/run_ttyd.sh'",
    "reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR $REVIEWER_VERIFY_ARCHITECTURE_ENABLE'",
    "git_auth_setup='git config --global --replace-all url.\"https://github.com/\".insteadOf \"git@github.com:\" && git config --global --add url.\"https://github.com/\".insteadOf \"ssh://git@github.com/\" && gh auth setup-git'"
]

# template for dev mode (runs in-place on local provider)
[create_templates.dev]
provider = "local"
worktree_base_folder = "/tmp/mngr-worktrees/"
extra_provision_command = [
    "uv tool install -e vendor/mngr/libs/mngr && uv tool install -e vendor/mngr/apps/minds_workspace_server && PATH=\"$UV_TOOL_BIN_DIR:$PATH\" mngr plugin add --path vendor/mngr/libs/mngr_modal/ --path vendor/mngr/libs/mngr_claude",
]
pass_env = ["MINDS_WORKSPACE_NAME", "ANTHROPIC_API_KEY", "TELEGRAM_BOT_TOKEN", "TELEGRAM_USER_NAME", "UV_TOOL_BIN_DIR", "UV_TOOL_DIR"]

# template for docker provider
[create_templates.docker]
provider = "docker"
target_path = "/code/"
setting = ["providers.docker.is_enabled=true"]
build_arg = ["--file=Dockerfile", "."]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"
# I guess it can pass a volume in too if you want

# template for lima VM provider
[create_templates.lima]
provider = "lima"
target_path = "/code/"
idle_mode = "disabled"
start_arg = ["--cpus=2", "--memory=4GiB", "--disk=5GiB"]

# template for vultr VPS provider (cloud mode)
[create_templates.vultr]
provider = "vultr"
target_path = "/code/"
build_arg = ["--file=Dockerfile", "--vps-plan=vc2-2c-4gb", "."]
# Disable idle detection entirely -- the host should never auto-shutdown.
# This also prevents shutdown when all agent tmux sessions exit.
idle_mode = "disabled"

## and these templates are for sub-agents created within the sandbox

# Chat template: minimal agent for additional chat sessions in the same work directory
[create_templates.chat]
type = "claude"
env = ["IS_SANDBOX=1", "IS_AUTONOMOUS=1", "REVIEWER_AUTOFIX_ENABLE=0", "REVIEWER_CI_ENABLE=0", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0", "REVIEWER_VERIFY_ARCHITECTURE_ENABLE=0"]
extra_window = [
    "reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR $REVIEWER_VERIFY_ARCHITECTURE_ENABLE'"
]

# Worktree template: agent in a new git worktree, no services by default -- creates its own as needed
[create_templates.worktree]
type = "main"

# Worker template: general purpose sub agent for doing tasks reliably (and ensuring that they are verified)
[create_templates.worker]
type = "worker"
extra_window = ["reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR'"]
env = ["REVIEWER_AUTOFIX_ENABLE=1", "REVIEWER_CI_ENABLE=1", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0"]
agent_args = [
    "--dangerously-skip-permissions",
    """--append-system-prompt "You were launched by another agent. List any questions at the end of your final response, along with the assumptions you made." """]

# Crystallize-worker template: sub-agent for the crystallize-task / heal-skill /
# update-skill flows. Inherits from `worker`, adds:
#  - MNGR_AGENT_ROLE=worker so the crystallization Stop hook skips in-worker.
#  - A pre-provision step that installs the bundled worker sub-skills from the
#    main agent's staging directory into the worker's .agents/skills/ tree.
# The staging directory is written by the main agent via
# .agents/skills/crystallize-task/scripts/install_worker_skills.sh before
# calling `mngr create -t crystallize-worker`.
[create_templates.crystallize-worker]
type = "worker"
extra_window = ["reviewer_settings='scripts/create_reviewer_settings.sh $REVIEWER_AUTOFIX_ENABLE $REVIEWER_CI_ENABLE $REVIEWER_VERIFY_CONVERSATION_ENABLE $REVIEWER_AUTOFIX_MINOR'"]
env = ["REVIEWER_AUTOFIX_ENABLE=1", "REVIEWER_CI_ENABLE=1", "REVIEWER_VERIFY_CONVERSATION_ENABLE=0", "REVIEWER_AUTOFIX_MINOR=0", "MNGR_AGENT_ROLE=worker"]
extra_provision_command = [
    "bash .agents/skills/crystallize-task/scripts/install_worker_skills.sh .agents/skills",
]
agent_args = [
    "--dangerously-skip-permissions",
    """--append-system-prompt "You were launched by the crystallize-task / heal-skill / update-skill flow. Use the bundled build-crystallized-skill / heal-crystallized-skill / update-crystallized-skill skill to drive your work. End your turn with any gate question the sub-skill asks for." """]
