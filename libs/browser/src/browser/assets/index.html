<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Browser</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; background: #1e1e1e; color: #ddd; }
  #app { display: flex; flex-direction: column; height: 100vh; min-width: 0; }

  #tabbar { display: flex; align-items: center; gap: 4px; padding: 4px 6px; background: #252525; border-bottom: 1px solid #333; overflow-x: auto; }
  .tab { padding: 4px 8px; background: #333; border-radius: 4px 4px 0 0; font-size: 12px; white-space: nowrap; cursor: pointer; max-width: 180px; overflow: hidden; text-overflow: ellipsis; display: flex; gap: 6px; align-items: center; }
  .tab.active { background: #0e639c; }
  .tab .close { opacity: .6; }
  .tab .close:hover { opacity: 1; }
  #newtab { padding: 4px 9px; background: #333; border: none; color: #ddd; border-radius: 4px; cursor: pointer; }
  #newtab:disabled { opacity: .5; cursor: not-allowed; }

  #navbar { display: flex; gap: 6px; padding: 6px; background: #252525; border-bottom: 1px solid #333; align-items: center; }
  .navbtn { padding: 4px 9px; background: #333; border: none; color: #ddd; border-radius: 4px; cursor: pointer; font-size: 15px; line-height: 1; }
  .navbtn:hover:not(:disabled) { background: #3d3d3d; }
  .navbtn:disabled { opacity: .4; cursor: not-allowed; }
  #url { flex: 1; padding: 5px 8px; background: #1e1e1e; border: 1px solid #444; color: #ddd; border-radius: 4px; }
  #url:disabled { opacity: .5; }

  /* A small persistent bar shown only when the human has explicitly taken
     control (human_pinned), so handing back to the agents is always discoverable. */
  #returnbar { display: none; align-items: center; gap: 10px; padding: 6px 10px; background: #2a2a2a; border-bottom: 1px solid #333; font-size: 12px; color: #4ec9b0; }
  #returnbar.show { display: flex; }
  #returnbtn { padding: 5px 12px; background: #0e639c; border: none; color: #fff; border-radius: 4px; cursor: pointer; }

  #stage { flex: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #screen { max-width: 100%; max-height: 100%; cursor: default; }
  #screen:focus { outline: none; }
  #placeholder { position: absolute; color: #777; font-size: 13px; text-align: center; padding: 0 20px; }

  /* Full-stage grey overlay shown while an agent has control. It sits above the
     canvas and swallows pointer events, so the human cannot click through to the
     live page (the server also drops input, but this blocks it locally too). */
  #overlay { display: none; position: absolute; inset: 0; z-index: 10; background: rgba(30, 30, 30, 0.72); flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 20px; }
  #overlay.show { display: flex; }
  #overlay .msg { font-size: 15px; color: #e2b340; font-weight: 600; max-width: 80%; word-break: break-word; }
  #overlay .sub { font-size: 12px; color: #aaa; max-width: 80%; min-height: 14px; }
  #takecontrol { padding: 8px 16px; background: #b5462b; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; }
  #takecontrol:disabled { opacity: .6; cursor: default; }
</style>
</head>
<body>
<div id="app">
  <div id="tabbar"><button id="newtab" title="New tab">+</button></div>
  <div id="navbar">
    <button id="back" class="navbtn" title="Back">&#8592;</button>
    <button id="forward" class="navbtn" title="Forward">&#8594;</button>
    <button id="reload" class="navbtn" title="Reload this page">&#8635;</button>
    <input id="url" placeholder="Enter URL and press Enter" />
  </div>
  <div id="returnbar">
    <span id="returnqueue">You have control.</span>
    <button id="returnbtn">Return control to agents</button>
  </div>
  <div id="stage">
    <canvas id="screen" tabindex="0"></canvas>
    <div id="placeholder">Starting browser…</div>
    <div id="overlay">
      <div class="msg" id="overlaymsg">An agent has control.</div>
      <div class="sub" id="overlaysub"></div>
      <button id="takecontrol">Take control</button>
    </div>
  </div>
</div>
<script>
(function () {
  "use strict";
  const canvas = document.getElementById("screen");
  const ctx = canvas.getContext("2d");
  const placeholder = document.getElementById("placeholder");
  const tabbar = document.getElementById("tabbar");
  const newtabBtn = document.getElementById("newtab");
  const backBtn = document.getElementById("back");
  const forwardBtn = document.getElementById("forward");
  const reloadBtn = document.getElementById("reload");
  const urlInput = document.getElementById("url");
  const overlay = document.getElementById("overlay");
  const overlayMsg = document.getElementById("overlaymsg");
  const overlaySub = document.getElementById("overlaysub");
  const takeControlBtn = document.getElementById("takecontrol");
  const returnBar = document.getElementById("returnbar");
  const returnBtn = document.getElementById("returnbtn");
  const returnQueue = document.getElementById("returnqueue");

  // Latest control state from the server's {type:"control"} broadcast. The
  // human can only drive the page while owner === "human".
  let controlOwner = "human";
  let castWs = null;
  let hasFrame = false;
  let lastMove = 0;
  let browserId = null;
  let reconnectTimer = null;
  let closedForGood = false;  // set on a 1008 close: the browser is gone, stop reconnecting.
  let crashed = false;        // set on a {type:"crashed"} message: Chromium died; show a dead state.

  function wsUrl(path) {
    const u = new URL(path, document.baseURI);
    u.protocol = (u.protocol === "https:") ? "wss:" : "ws:";
    return u.toString();
  }

  // Idle-countdown + queue line under the "Agent has control" overlay. The server
  // pushes idle_seconds / idle_release_seconds (and the waiting queue) on each
  // control message + every keepalive tick; we interpolate by the second in between.
  let idleTimer = null, idleSeconds = 0, releaseSeconds = null, waitingList = [];
  function renderOverlaySub() {
    const parts = [];
    if (releaseSeconds !== null) parts.push("idle " + idleSeconds + "s · releases control in " + releaseSeconds + "s");
    if (waitingList.length) parts.push(waitingList.length + " waiting: " + waitingList.join(", "));
    overlaySub.textContent = parts.join("   ·   ");
  }
  function startIdleTimer() {
    if (idleTimer) return;
    idleTimer = setInterval(() => {
      idleSeconds += 1;
      if (releaseSeconds !== null) releaseSeconds = Math.max(0, releaseSeconds - 1);
      renderOverlaySub();
    }, 1000);
  }
  function stopIdleTimer() { if (idleTimer) { clearInterval(idleTimer); idleTimer = null; } }

  // Drive the overlay / return-bar / input lock from the latest control message.
  // owner == "agent":                      grey overlay + "Take control".
  // owner == "human" && human_pinned:      no overlay, persistent "Return to agents" bar.
  // owner == "human" && !human_pinned:     resting state, fully interactive, no chrome.
  function setControl(state) {
    controlOwner = state.owner;
    const agentDriving = state.owner === "agent";
    const humanPinned = state.owner === "human" && !!state.human_pinned;

    tabbar.style.opacity = agentDriving ? "0.5" : "1";
    tabbar.style.pointerEvents = agentDriving ? "none" : "auto";
    urlInput.disabled = agentDriving;
    newtabBtn.disabled = agentDriving;
    backBtn.disabled = agentDriving;
    forwardBtn.disabled = agentDriving;
    reloadBtn.disabled = agentDriving;

    if (agentDriving) {
      const who = state.owner_name || state.owner_agent_id || "an agent";
      overlayMsg.textContent = "Agent has control: " + who;
      overlay.classList.add("show");
      takeControlBtn.disabled = false;
      waitingList = Array.isArray(state.waiting) ? state.waiting : [];
      if (typeof state.idle_release_seconds === "number") {
        idleSeconds = state.idle_seconds || 0;
        releaseSeconds = state.idle_release_seconds;
        startIdleTimer();
      } else {
        releaseSeconds = null;
        stopIdleTimer();
      }
      renderOverlaySub();
    } else {
      overlay.classList.remove("show");
      stopIdleTimer();
      releaseSeconds = null;
      waitingList = [];
    }
    // Human-control bar: list the agents queued to use this browser, and show the
    // hand-back button ONLY when one is actually waiting -- otherwise there is
    // nobody to return to, and the next agent that wants the browser just takes it.
    if (humanPinned) {
      const waiting = Array.isArray(state.waiting) ? state.waiting : [];
      returnQueue.textContent = waiting.length
        ? "You have control. Agents waiting to use this browser: " + waiting.join(", ")
        : "You have control. No agents are waiting — the next agent that wants this browser can take over.";
      returnBtn.style.display = waiting.length ? "" : "none";
    }
    returnBar.classList.toggle("show", humanPinned);
  }

  function showLoading(msg) {
    hasFrame = false;
    placeholder.textContent = msg || "Loading…";
    placeholder.style.display = "block";
  }

  // The browser's Chromium died (OS/OOM kill, crash). Show a clear, terminal dead
  // state -- distinct from the agent-control overlay and the "reconnecting" state --
  // and lock the controls. This browser is gone; a new one opens as a separate tab.
  function showCrashed() {
    crashed = true;
    hasFrame = false;
    stopIdleTimer();
    overlay.classList.remove("show");
    returnBar.classList.remove("show");
    placeholder.textContent =
      "This browser crashed (Chromium was killed — e.g. out of memory). Open a new browser from the + menu.";
    placeholder.style.display = "block";
    tabbar.style.opacity = "0.5";
    tabbar.style.pointerEvents = "none";
    [urlInput, newtabBtn, backBtn, forwardBtn, reloadBtn].forEach((el) => (el.disabled = true));
  }

  function renderTabs(tabs) {
    [...tabbar.querySelectorAll(".tab")].forEach((t) => t.remove());
    tabs.forEach((tab) => {
      const el = document.createElement("div");
      el.className = "tab" + (tab.active ? " active" : "");
      el.title = tab.url;
      const label = document.createElement("span");
      label.textContent = tab.title || tab.url || "tab";
      el.appendChild(label);
      const close = document.createElement("span");
      close.className = "close";
      close.textContent = "x";
      close.onclick = (e) => { e.stopPropagation(); sendCast({ type: "tab", action: "close", index: tab.index }); };
      el.appendChild(close);
      el.onclick = () => { showLoading(); sendCast({ type: "tab", action: "activate", index: tab.index }); };
      tabbar.insertBefore(el, newtabBtn);
      // Don't clobber the URL while the user is typing in it.
      if (tab.active && document.activeElement !== urlInput) urlInput.value = tab.url || "";
    });
  }

  function drawFrame(b64) {
    const img = new Image();
    img.onload = () => {
      if (canvas.width !== img.naturalWidth || canvas.height !== img.naturalHeight) {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
      }
      ctx.drawImage(img, 0, 0);
      placeholder.style.display = "none";
      hasFrame = true;
    };
    img.src = "data:image/jpeg;base64," + b64;
  }

  function sendCast(obj) { if (castWs && castWs.readyState === 1) castWs.send(JSON.stringify(obj)); }

  // --- coordinate scaling: canvas CSS px -> frame device px ---
  function scaled(e) {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width;
    const sy = canvas.height / r.height;
    return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  }
  function modifiers(e) {
    return (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
  }
  const BUTTONS = ["left", "middle", "right"];

  function mouse(type, e) {
    if (controlOwner === "agent" || !hasFrame) return;
    if (type === "mouseMoved") {
      const now = performance.now();
      if (now - lastMove < 30) return;  // throttle moves so they don't starve the frame stream
      lastMove = now;
    }
    const p = scaled(e);
    const button = BUTTONS[e.button] || "left";
    sendCast({ type: "mouse", event: {
      type: type, x: p.x, y: p.y,
      button: (type === "mouseMoved") ? "none" : button,
      buttons: e.buttons, clickCount: (type === "mousePressed" || type === "mouseReleased") ? 1 : 0,
      modifiers: modifiers(e),
    }});
  }
  canvas.addEventListener("mousedown", (e) => { canvas.focus(); mouse("mousePressed", e); });
  canvas.addEventListener("mouseup", (e) => mouse("mouseReleased", e));
  canvas.addEventListener("mousemove", (e) => mouse("mouseMoved", e));
  canvas.addEventListener("contextmenu", (e) => e.preventDefault());
  canvas.addEventListener("wheel", (e) => {
    if (controlOwner === "agent" || !hasFrame) return;
    e.preventDefault();
    const p = scaled(e);
    sendCast({ type: "mouse", event: { type: "mouseWheel", x: p.x, y: p.y, button: "none", deltaX: e.deltaX, deltaY: e.deltaY, modifiers: modifiers(e) } });
  }, { passive: false });

  function key(type, e) {
    if (controlOwner === "agent" || !hasFrame) return;
    e.preventDefault();
    const isChar = type === "keyDown" && e.key.length === 1;
    sendCast({ type: "key", event: {
      type: type, key: e.key, code: e.code,
      windowsVirtualKeyCode: e.keyCode, text: isChar ? e.key : undefined,
      autoRepeat: e.repeat, modifiers: modifiers(e),
    }});
  }
  // Listen on the canvas (focused by a click), so host/browser shortcuts still
  // work when the browser pane isn't focused, and typing in the URL input is
  // unaffected.
  canvas.addEventListener("keydown", (e) => key("keyDown", e));
  canvas.addEventListener("keyup", (e) => key("keyUp", e));

  // --- controls ---
  newtabBtn.onclick = () => { showLoading(); sendCast({ type: "tab", action: "new" }); };  // server opens the home page
  // Page navigation (only active while the human has control; the server also
  // gates on that). These drive the live page's own history, not the pane.
  backBtn.onclick = () => sendCast({ type: "back" });
  forwardBtn.onclick = () => sendCast({ type: "forward" });
  reloadBtn.onclick = () => sendCast({ type: "reload" });
  urlInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      let u = urlInput.value.trim();
      if (u && !/^https?:\/\//.test(u)) u = "https://" + u;
      if (u) { showLoading(); sendCast({ type: "navigate", url: u }); }
    }
  });
  // Take control: optimistically hide the overlay so a laggy round-trip can't
  // invite a double-click; the authoritative {type:"control"} broadcast reconciles.
  takeControlBtn.onclick = () => {
    takeControlBtn.disabled = true;
    overlay.classList.remove("show");
    sendCast({ type: "take_control" });
  };
  returnBtn.onclick = () => { returnBar.classList.remove("show"); sendCast({ type: "return_to_agents" }); };

  // --- connect ---
  function connect(id) {
    browserId = id;
    castWs = new WebSocket(wsUrl("browsers/" + id + "/cast"));
    castWs.onmessage = (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch (_) { return; }
      if (m.type === "crashed") showCrashed();
      else if (crashed) return;  // once crashed, ignore any late frames/control/tabs
      else if (m.type === "frame") drawFrame(m.data);
      else if (m.type === "control") setControl(m);
      else if (m.type === "tabs") renderTabs(m.tabs);
      // m.type === "ping" -> ignore; it only keeps the proxy stream alive.
    };
    castWs.onclose = (ev) => {
      hasFrame = false;
      // 1008: the browser/session no longer exists (daemon restarted or closed).
      // Terminal state -- show a clear message and stop reconnecting.
      if (ev.code === 1008) {
        closedForGood = true;
        overlay.classList.remove("show");
        returnBar.classList.remove("show");
        showLoading("Browser closed — reopen it from the + menu.");
        return;
      }
      placeholder.style.display = "block";
      placeholder.textContent = "Reconnecting…";
      scheduleReconnect();
    };
    castWs.onerror = () => { try { castWs.close(); } catch (_) {} };
  }

  function scheduleReconnect() {
    if (reconnectTimer || browserId === null || closedForGood) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connect(browserId);
    }, 1000);
  }

  function boot() {
    // Which browser to show comes from the URL (?session=<id>); default to the
    // permanent browser 0, which the server lazily (re)creates on connect.
    const params = new URLSearchParams(location.search);
    const raw = params.get("session");
    const id = (raw !== null && /^\d+$/.test(raw)) ? parseInt(raw, 10) : 0;
    connect(id);
  }
  boot();
})();
</script>
</body>
</html>
