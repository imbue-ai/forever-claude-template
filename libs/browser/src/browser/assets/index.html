<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Browser</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; background: #1e1e1e; color: #ddd; }
  #app { display: flex; height: 100vh; }
  #left { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #right { width: 360px; border-left: 1px solid #333; display: flex; flex-direction: column; }

  #tabbar { display: flex; align-items: center; gap: 4px; padding: 4px 6px; background: #252525; border-bottom: 1px solid #333; overflow-x: auto; }
  .tab { padding: 4px 8px; background: #333; border-radius: 4px 4px 0 0; font-size: 12px; white-space: nowrap; cursor: pointer; max-width: 180px; overflow: hidden; text-overflow: ellipsis; display: flex; gap: 6px; align-items: center; }
  .tab.active { background: #0e639c; }
  .tab .close { opacity: .6; }
  .tab .close:hover { opacity: 1; }
  #newtab { padding: 4px 9px; background: #333; border: none; color: #ddd; border-radius: 4px; cursor: pointer; }
  #newtab:disabled { opacity: .5; cursor: not-allowed; }

  #navbar { display: flex; gap: 6px; padding: 6px; background: #252525; border-bottom: 1px solid #333; }
  #url { flex: 1; padding: 5px 8px; background: #1e1e1e; border: 1px solid #444; color: #ddd; border-radius: 4px; }
  #url:disabled { opacity: .5; }

  #stage { flex: 1; position: relative; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  #screen { max-width: 100%; max-height: 100%; cursor: default; }
  #placeholder { position: absolute; color: #777; font-size: 13px; }

  #status { padding: 12px; border-bottom: 1px solid #333; background: #252525; }
  #status .owner { font-weight: 600; margin-bottom: 8px; }
  #status .owner.agent { color: #e2b340; }
  #status .owner.human { color: #4ec9b0; }
  #takecontrol { display: none; padding: 6px 12px; background: #b5462b; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
  #screen:focus { outline: none; }

  #chat { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #log { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 7px 9px; border-radius: 8px; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: #0e639c; align-self: flex-end; max-width: 90%; }
  .msg.assistant { background: #333; align-self: flex-start; max-width: 90%; }
  .msg.step { background: #2a2a2a; color: #aaa; font-size: 12px; align-self: flex-start; max-width: 95%; }
  .msg.error { background: #5a1d1d; color: #f0b0b0; align-self: flex-start; max-width: 95%; }
  .trace { align-self: flex-start; max-width: 95%; background: #2a2a2a; border-radius: 8px; padding: 4px 9px; font-size: 12px; color: #9aa6a6; }
  .trace summary { cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trace.action summary { color: #8fbf8f; }
  .trace pre { white-space: pre-wrap; word-break: break-word; margin: 6px 0 2px; color: #cccccc; }
  #queued { display: none; margin: 0 8px 8px; padding: 6px 9px; background: #3a3320; border: 1px solid #5a4d20; border-radius: 6px; font-size: 12px; color: #e2c98a; }
  #queued .cancel { float: right; cursor: pointer; opacity: .7; }
  #queued .cancel:hover { opacity: 1; }
  #composer { display: flex; gap: 6px; padding: 8px; border-top: 1px solid #333; }
  #prompt { flex: 1; resize: none; height: 40px; padding: 8px; background: #1e1e1e; border: 1px solid #444; color: #ddd; border-radius: 6px; font-family: inherit; }
  #send { padding: 0 14px; background: #0e639c; border: none; color: #fff; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="tabbar"><button id="newtab" title="New tab">+</button></div>
    <div id="navbar"><input id="url" placeholder="Enter URL and press Enter" /></div>
    <div id="stage">
      <canvas id="screen" tabindex="0"></canvas>
      <div id="placeholder">Starting browser…</div>
    </div>
  </div>
  <div id="right">
    <div id="status">
      <div class="owner human" id="owner">You have control</div>
      <button id="takecontrol">Take control</button>
    </div>
    <div id="chat">
      <div id="log"></div>
      <div id="queued"></div>
      <div id="composer">
        <textarea id="prompt" placeholder="Ask the agent to do something…"></textarea>
        <button id="send">Send</button>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  "use strict";
  const canvas = document.getElementById("screen");
  const ctx = canvas.getContext("2d");
  const placeholder = document.getElementById("placeholder");
  const ownerEl = document.getElementById("owner");
  const takeControlBtn = document.getElementById("takecontrol");
  const queuedEl = document.getElementById("queued");
  const tabbar = document.getElementById("tabbar");
  const newtabBtn = document.getElementById("newtab");
  const urlInput = document.getElementById("url");
  const log = document.getElementById("log");
  const promptEl = document.getElementById("prompt");
  const sendBtn = document.getElementById("send");

  let control = "human";
  let castWs = null;
  let chatWs = null;
  let hasFrame = false;
  let lastMove = 0;
  let sessionId = null;
  let reconnectTimer = null;

  function rel(path) { return new URL(path, document.baseURI).toString(); }
  function wsUrl(path) {
    const u = new URL(path, document.baseURI);
    u.protocol = (u.protocol === "https:") ? "wss:" : "ws:";
    return u.toString();
  }

  function addMsg(role, text, detail) {
    if (role === "thinking" || role === "action") {
      const d = document.createElement("details");
      d.className = "trace " + role;
      const s = document.createElement("summary");
      s.textContent = (role === "thinking" ? "Thinking — " : "Action — ") + (text || "");
      d.appendChild(s);
      if (detail) { const pre = document.createElement("pre"); pre.textContent = detail; d.appendChild(pre); }
      log.appendChild(d);
    } else {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      log.appendChild(div);
    }
    log.scrollTop = log.scrollHeight;
  }

  function setControl(owner) {
    control = owner;
    // While the agent drives, lock human tab/URL/canvas changes; the composer
    // queues (Send -> Queue) instead of starting a second concurrent run.
    const agentDriving = owner === "agent";
    tabbar.style.opacity = agentDriving ? "0.5" : "1";
    tabbar.style.pointerEvents = agentDriving ? "none" : "auto";
    urlInput.disabled = agentDriving;
    newtabBtn.disabled = agentDriving;
    sendBtn.textContent = agentDriving ? "Queue" : "Send";
    if (agentDriving) {
      ownerEl.textContent = "Agent has control";
      ownerEl.className = "owner agent";
      takeControlBtn.style.display = "inline-block";
    } else {
      ownerEl.textContent = "You have control";
      ownerEl.className = "owner human";
      takeControlBtn.style.display = "none";
    }
  }

  function setQueued(text) {
    if (text) {
      queuedEl.innerHTML = "";
      const span = document.createElement("span");
      span.textContent = "Queued: " + text;
      const cancel = document.createElement("span");
      cancel.className = "cancel";
      cancel.textContent = "✕ cancel";
      cancel.onclick = () => sendChat({ action: "cancel_queue" });
      queuedEl.appendChild(span);
      queuedEl.appendChild(cancel);
      queuedEl.style.display = "block";
    } else {
      queuedEl.style.display = "none";
      queuedEl.innerHTML = "";
    }
  }

  function showLoading(msg) {
    hasFrame = false;
    placeholder.textContent = msg || "Loading…";
    placeholder.style.display = "block";
  }

  function renderTabs(tabs) {
    [...tabbar.querySelectorAll(".tab")].forEach((t) => t.remove());
    tabs.forEach((tab) => {
      const el = document.createElement("div");
      el.className = "tab" + (tab.active ? " active" : "");
      el.title = tab.url;
      const label = document.createElement("span");
      label.textContent = tab.title || tab.url || "tab";
      el.appendChild(label);
      const close = document.createElement("span");
      close.className = "close";
      close.textContent = "x";
      close.onclick = (e) => { e.stopPropagation(); sendCast({ type: "tab", action: "close", index: tab.index }); };
      el.appendChild(close);
      el.onclick = () => { showLoading(); sendCast({ type: "tab", action: "activate", index: tab.index }); };
      tabbar.insertBefore(el, newtabBtn);
      // Don't clobber the URL while the user is typing in it.
      if (tab.active && document.activeElement !== urlInput) urlInput.value = tab.url || "";
    });
  }

  function drawFrame(b64) {
    const img = new Image();
    img.onload = () => {
      if (canvas.width !== img.naturalWidth || canvas.height !== img.naturalHeight) {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
      }
      ctx.drawImage(img, 0, 0);
      placeholder.style.display = "none";
      hasFrame = true;
    };
    img.src = "data:image/jpeg;base64," + b64;
  }

  function sendCast(obj) { if (castWs && castWs.readyState === 1) castWs.send(JSON.stringify(obj)); }
  function sendChat(obj) { if (chatWs && chatWs.readyState === 1) chatWs.send(JSON.stringify(obj)); }

  // --- coordinate scaling: canvas CSS px -> frame device px ---
  function scaled(e) {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width;
    const sy = canvas.height / r.height;
    return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  }
  function modifiers(e) {
    return (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
  }
  const BUTTONS = ["left", "middle", "right"];

  function mouse(type, e) {
    if (control === "agent" || !hasFrame) return;
    if (type === "mouseMoved") {
      const now = performance.now();
      if (now - lastMove < 30) return;  // throttle moves so they don't starve the frame stream
      lastMove = now;
    }
    const p = scaled(e);
    const button = BUTTONS[e.button] || "left";
    sendCast({ type: "mouse", event: {
      type: type, x: p.x, y: p.y,
      button: (type === "mouseMoved") ? "none" : button,
      buttons: e.buttons, clickCount: (type === "mousePressed" || type === "mouseReleased") ? 1 : 0,
      modifiers: modifiers(e),
    }});
  }
  canvas.addEventListener("mousedown", (e) => { canvas.focus(); mouse("mousePressed", e); });
  canvas.addEventListener("mouseup", (e) => mouse("mouseReleased", e));
  canvas.addEventListener("mousemove", (e) => mouse("mouseMoved", e));
  canvas.addEventListener("contextmenu", (e) => e.preventDefault());
  canvas.addEventListener("wheel", (e) => {
    if (control === "agent" || !hasFrame) return;
    e.preventDefault();
    const p = scaled(e);
    sendCast({ type: "mouse", event: { type: "mouseWheel", x: p.x, y: p.y, button: "none", deltaX: e.deltaX, deltaY: e.deltaY, modifiers: modifiers(e) } });
  }, { passive: false });

  function key(type, e) {
    if (control === "agent" || !hasFrame) return;
    e.preventDefault();
    const isChar = type === "keyDown" && e.key.length === 1;
    sendCast({ type: "key", event: {
      type: type, key: e.key, code: e.code,
      windowsVirtualKeyCode: e.keyCode, text: isChar ? e.key : undefined,
      autoRepeat: e.repeat, modifiers: modifiers(e),
    }});
  }
  // Listen on the canvas (focused by a click), so host/browser shortcuts still
  // work when the browser pane isn't focused, and typing in the chat/URL inputs
  // is unaffected.
  canvas.addEventListener("keydown", (e) => key("keyDown", e));
  canvas.addEventListener("keyup", (e) => key("keyUp", e));

  // --- controls ---
  newtabBtn.onclick = () => { showLoading(); sendCast({ type: "tab", action: "new" }); };  // server opens the home page
  urlInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      let u = urlInput.value.trim();
      if (u && !/^https?:\/\//.test(u)) u = "https://" + u;
      if (u) { showLoading(); sendCast({ type: "navigate", url: u }); }
    }
  });
  takeControlBtn.onclick = () => sendChat({ action: "stop" });
  function submitPrompt() {
    const text = promptEl.value.trim();
    if (!text) return;
    sendChat({ prompt: text });  // server runs it now, or queues it if the agent is busy
    promptEl.value = "";
  }
  sendBtn.onclick = submitPrompt;
  promptEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitPrompt(); }
  });

  // --- connect ---
  function connect(id) {
    sessionId = id;
    castWs = new WebSocket(wsUrl("sessions/" + id + "/cast"));
    castWs.onmessage = (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch (_) { return; }
      if (m.type === "frame") drawFrame(m.data);
      else if (m.type === "control") setControl(m.owner);
      else if (m.type === "tabs") renderTabs(m.tabs);
      // m.type === "ping" -> ignore; it only keeps the proxy stream alive.
    };
    castWs.onclose = () => {
      hasFrame = false;
      placeholder.style.display = "block";
      placeholder.textContent = "Reconnecting…";
      scheduleReconnect();
    };
    castWs.onerror = () => { try { castWs.close(); } catch (_) {} };
    chatWs = new WebSocket(wsUrl("sessions/" + id + "/chat"));
    chatWs.onmessage = (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch (_) { return; }
      if (m.type === "chat") addMsg(m.role, m.text, m.detail);
      else if (m.type === "control") setControl(m.owner);
      else if (m.type === "error") addMsg("error", m.text);
      else if (m.type === "queued") setQueued(m.text);
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer || !sessionId) return;
    // Reconnect both sockets to the SAME session (the server keeps it alive).
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      try { if (chatWs) chatWs.close(); } catch (_) {}
      connect(sessionId);
    }, 1000);
  }

  async function boot() {
    const params = new URLSearchParams(location.search);
    let id = params.get("session");
    if (!id) {
      const resp = await fetch(rel("sessions"), { method: "POST" });
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        placeholder.textContent = body.error || ("Could not start browser (HTTP " + resp.status + ")");
        return;
      }
      const data = await resp.json();
      id = data.id;
      params.set("session", id);
      history.replaceState(null, "", location.pathname + "?" + params.toString());
      if (!data.key_available) addMsg("error", "No Anthropic API key found — the chat agent is disabled, but you can drive the browser yourself.");
    }
    connect(id);
    window.addEventListener("beforeunload", () => { fetch(rel("sessions/" + id), { method: "DELETE", keepalive: true }); });
  }
  boot();
})();
</script>
</body>
</html>
